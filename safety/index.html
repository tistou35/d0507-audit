<style>

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; font-family:Arial,"Helvetica Neue",sans-serif; background:var(--grey); color:var(--ink); font-size:15px;}
header.app{background:var(--navy); color:#fff; padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 0 16px; position:sticky; top:0; z-index:50;}

main{padding:12px; max-width:1080px; margin:0 auto; padding-bottom:80px;}

.card > .hd .prog{font-size:12px; font-weight:normal; text-align:right; white-space:nowrap;}
.bar{height:6px; background:#e2e9f2;}
.bar i{display:block; height:100%; background:var(--green); transition:width .3s;}
.bar i.gap{background:var(--red);}
.body{display:none; padding:6px 10px 12px;}
.card.open .body{display:block;}
.sec{margin:10px 0 4px; background:var(--lblue); color:var(--navy); font-weight:bold; padding:9px 12px; border-radius:7px; font-size:14px; display:flex; justify-content:space-between; align-items:center; gap:8px;}

.gno{background:var(--navy); color:#fff; border-radius:5px; padding:1px 7px; font-size:12px; flex:0 0 auto;}

.meta{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:6px;}
.chip{font-size:11px; border-radius:5px; padding:2px 7px; background:var(--grey); color:#4a5a70; border:1px solid #dde4ee;}
.chip.rr{background:#eef4fb; color:var(--blue); border-color:#c9dcf2;}
.chip.prevY{background:var(--greenbg); color:var(--green); border:none;}
.chip.prevN{background:var(--redbg); color:var(--red); border:none;}
.chip.prevNA{background:#eee; color:#666; border:none;}
.ctr{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.stbtn{min-width:52px; min-height:40px; border-radius:8px; border:1.5px solid #c8d2e0; background:#fff; font-weight:bold; font-size:14px; cursor:pointer; color:#5a6a80;}
.stbtn.S.on{background:var(--green); border-color:var(--green); color:#fff;}
.stbtn.U.on{background:var(--red); border-color:var(--red); color:#fff;}
.stbtn.NA.on{background:#667; border-color:#667; color:#fff;}
.refin{flex:1 1 200px; min-height:38px; border:1px solid #c8d2e0; border-radius:7px; padding:6px 9px; font-size:13px; font-family:inherit; color:var(--navy); background:#fff;}
.rmk{width:100%; margin-top:7px; border:1.5px solid #d3dce8; background:#fbfcfe; border-radius:7px; padding:7px 9px; font-size:13px; font-family:inherit; min-height:44px;}
.item.stU .rmk{border-color:var(--red); background:#fff8f8;}
.thd{margin:0 0 6px; color:#556; font-size:13px; line-height:1.45;}
details.mref{margin:0 0 8px; border:1px solid #c9dcf2; border-radius:7px; background:#f4f8fd; font-size:12.5px;}
details.mref summary{padding:7px 10px; color:var(--blue); font-weight:bold; cursor:pointer; min-height:36px; display:flex; align-items:center; gap:6px; list-style:none;}
details.mref summary::-webkit-details-marker{display:none;}
details.mref[open] summary{border-bottom:1px dashed #c9dcf2;}
details.mref .mx{padding:8px 11px; color:#334; line-height:1.55; white-space:pre-line;}
details.mref .mx b{color:var(--navy);}
details.how2{background:#fffdf4; border-color:#e8d9a8;}
details.how2 summary{color:var(--amber);}
.assignbar{background:#fff; border:2px solid var(--blue); border-radius:10px; padding:12px; margin-bottom:14px;}
.assignbar h4{margin:0 0 8px; color:var(--navy); font-size:14px;}
.assignbar .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.assignbar input{min-height:42px; border:1px solid #c8d2e0; border-radius:8px; padding:8px 10px; font-size:14px; font-family:inherit;}
.gsel{width:24px; height:24px; accent-color:var(--red); flex:0 0 auto; margin-top:2px;}
.gaphead{display:flex; gap:10px; align-items:flex-start;}
.carbox{background:#f7f9fc; border:1px solid #c9d6e8; border-radius:8px; padding:9px 11px; margin-top:8px; font-size:12.5px;}
.carbox .cno{font-weight:bold; color:var(--navy);}
.carpill{display:inline-block; border-radius:10px; padding:2px 10px; font-size:11px; font-weight:bold; margin-left:6px;}
.carpill.A{background:var(--amberbg); color:var(--amber);}
.carpill.R{background:#dbe9ff; color:#1d5eb8;}
.carpill.V{background:var(--greenbg); color:var(--green);}
.carpill.X{background:var(--redbg); color:var(--red);}
.overdue{color:var(--red); font-weight:bold;}
.carbox .hist{color:#7a8798; font-size:11px; margin-top:5px; white-space:pre-line;}
.castep{display:flex; gap:9px; margin-top:9px;}
.castep .sn{flex:0 0 24px; height:24px; border-radius:50%; background:var(--blue); color:#fff; font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center;}
.castep.done .sn{background:var(--green);}
.castep.wait .sn{background:#aab6c6;}
.castep .sb{flex:1; min-width:0;}
.ca-lb{font-weight:bold; color:var(--navy); font-size:12px; margin-top:7px;}
.ca-sm{min-height:34px; border:1px solid #c8d2e0; border-radius:6px; padding:3px 8px;}
.sigwrap{position:fixed; inset:0; background:rgba(10,20,40,.55); display:flex; align-items:center; justify-content:center; z-index:99;}
.sigbox{background:#fff; border-radius:12px; padding:16px; max-width:580px; width:94%; box-shadow:0 10px 40px rgba(0,0,0,.3);}
.sigbox canvas{border:1.5px dashed #8fa3bd; border-radius:8px; touch-action:none; width:100%; height:180px; background:#fff; display:block; margin-top:6px;}
.sigslot{border:1px solid #d8dfe8; border-radius:8px; background:#fff; padding:7px 10px; min-width:170px; font-size:11.5px; text-align:center;}
.sigslot img{height:46px; display:block; margin:2px auto;}
.sigslot .sr{font-weight:bold; color:var(--navy);}
.carbtn{min-height:38px; border-radius:7px; border:1px solid var(--blue); background:#fff; color:var(--blue); font-size:12px; font-weight:bold; padding:5px 10px; cursor:pointer; margin:3px 4px 0 0;}
.carbtn.v{border-color:var(--green); color:var(--green);}
.carbtn.x{border-color:var(--red); color:var(--red);}
.ca-in{width:100%; margin-top:6px; border:1px solid #c8d2e0; border-radius:7px; padding:7px 9px; font-size:13px; font-family:inherit; min-height:40px;}
table.cartab{width:100%; border-collapse:collapse; font-size:12.5px; background:#fff;}
table.cartab th{background:var(--navy); color:#fff; padding:7px; text-align:left; font-size:12px;}
table.cartab td{border:1px solid #dde4ee; padding:6px 8px; vertical-align:top;}
.chklist{border:1px dashed #b9c9de; border-radius:8px; padding:8px 10px 4px; margin-bottom:8px; background:#fcfdff;}
.chklist .cht{font-size:11.5px; font-weight:bold; color:var(--navy); margin-bottom:4px;}
.chk{display:flex; align-items:flex-start; gap:8px; padding:5px 0; font-size:13px; color:#334; cursor:pointer;}
.chk input{width:20px; height:20px; margin:0; flex:0 0 auto; accent-color:var(--green);}
.chk.ck{color:var(--green);}
.photorow{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:7px;}
.pbtn{min-height:40px; border-radius:8px; border:1.5px solid var(--blue); background:#fff; color:var(--blue); font-weight:bold; font-size:13px; padding:6px 12px; cursor:pointer;}

.thumb .del{position:absolute; top:0; right:0; background:rgba(192,0,0,.85); color:#fff; border:none; width:20px; height:20px; font-size:12px; line-height:1; cursor:pointer; border-radius:0 0 0 7px;}

.how{background:#f6f9fd; border-left:3px solid var(--blue); border-radius:0 7px 7px 0; padding:7px 10px; font-size:12.5px; color:#3a4a60; line-height:1.5; margin-bottom:8px;}
.chip.mt{background:var(--amberbg); color:var(--amber); border:none;}
.dualrow{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:6px;}
.dlab{flex:0 0 92px; font-size:11.5px; font-weight:bold; color:var(--navy); line-height:1.25;}
.dhint{font-size:11px; color:#8a97a8;}
.toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center;}
.toolbar input[type=search]{flex:1 1 220px; min-height:44px; border:1px solid #c8d2e0; border-radius:9px; padding:8px 12px; font-size:15px; font-family:inherit;}
.fbtn{min-height:40px; border-radius:8px; border:1.5px solid var(--blue); background:#fff; color:var(--blue); font-weight:bold; padding:6px 12px; font-size:13px; cursor:pointer;}
.fbtn.on{background:var(--blue); color:#fff;}
.abtn{min-height:44px; border-radius:9px; border:none; background:var(--navy); color:#fff; font-weight:bold; padding:8px 16px; font-size:14px; cursor:pointer;}
.abtn.sec2{background:var(--blue);}

.dash{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin-bottom:14px;}
.dcard{background:#fff; border:1px solid #d8dfe8; border-radius:10px; padding:14px;}
.dcard h3{margin:0 0 2px; font-size:15px; color:var(--navy);}
.dcard .th{font-size:12px; color:#667; margin-bottom:8px;}
.dnum{font-size:26px; font-weight:bold; color:var(--navy);}
.dnum small{font-size:13px; color:#667; font-weight:normal;}
.drow{display:flex; gap:10px; margin-top:6px; font-size:12px;}
.drow b.g{color:var(--green);} .drow b.u{color:var(--red);} .drow b.n{color:#666;} .drow b.p{color:var(--amber);}

table.cl th{background:var(--navy); color:#fff; padding:8px; text-align:left; font-size:12px;}
table.cl td{border:1px solid #dde4ee; padding:7px 8px; vertical-align:top;}
table.cl tr.subhd td{background:var(--lblue); color:var(--navy); font-weight:bold;}
.pill{display:inline-block; border-radius:10px; padding:1px 9px; font-size:11px; font-weight:bold;}
.pill.ok{background:var(--greenbg); color:var(--green);}
.pill.gap{background:var(--redbg); color:var(--red);}

.audmeta{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:8px; margin-bottom:12px;}
.audmeta label{font-size:11px; color:var(--navy); font-weight:bold; display:block; margin-bottom:2px;}
.audmeta input{width:100%; min-height:42px; border:1px solid #c8d2e0; border-radius:8px; padding:8px 10px; font-size:14px; font-family:inherit;}
.note{background:#fff; border-left:4px solid var(--blue); padding:10px 12px; font-size:12.5px; color:#445; border-radius:0 8px 8px 0; margin-bottom:12px; line-height:1.5;}
.gapitem{background:#fff; border:1px solid var(--redbg); border-left:4px solid var(--red); border-radius:8px; padding:10px 12px; margin-bottom:8px; font-size:13.5px;}
.gapitem .w{color:#667; font-size:12px; margin-top:3px;}

 body{background:#fff;} .body{display:block!important;} main{padding-bottom:0;}

formance: unsatisfactory lessons trigger the TM review/repeat process before progressing.","rr":"","rk":"","ref":"TM / ECA","prev":"","hd":0,"how":"ตรวจบันทึก","th":"การติดตามความก้าวหน้าจับนักเรียนอ่อนได้จริง: บทเรียนไม่ผ่านเข้าสู่กระบวนการทบทวน/ซ่อมตาม TM ก่อนไปต่อ","dual":1},{"id":"SAF-0022","d":"Instructor standardisation is effective in practice: different FIs teach/assess the same exercise consistently (compare sampled records/observations).","rr":"","rk":"","ref":"OMA D.2.8","prev":"","hd":0,"how":"ตรวจไขว้ / สังเกตการณ์","th":"Standardisation ของครูได้ผลจริง: ครูต่างคนสอน/ประเมินแบบฝึกเดียวกันสม่ำเสมอ","dual":1}]}]}]},{"t":"SA7 – Ground & Facility Safety","th":"นิรภัยภาคพื้นและสถานที่ [OMM 1.10 / MMSOP]","secs":[{"t":"","groups":[{"n":"1","subj":"SA7.1  Ground safety / ความปลอดภัยภาคพื้น","items":[{"id":"SAF-0023","d":"Ramp/apron operations are safe: FOD control, propeller safety discipline, vehicle rules airside, high-visibility/PPE use.","rr":"","rk":"","ref":"MMSOP Vehicle Safety in Airside / PPE","prev":"","hd":0,"how":"สังเกตการณ์","th":"ปฏิบัติการลานจอดปลอดภัย: ควบคุม FOD, วินัยเรื่องใบพัด, กติการถในเขต airside, ใช้เสื้อสะท้อนแสง/PPE","dual":1},{"id":"SAF-0024","d":"Fire extinguishers, first aid and emergency equipment across the school are in date and accessible; staff know locations.","rr":"","rk":"","ref":"MMSOP Fire Extinguisher Inspections","prev":"","hd":0,"how":"สังเกตการณ์ / สัมภาษณ์","th":"ถังดับเพลิง ปฐมพยาบาล และอุปกรณ์ฉุกเฉินทั่วโรงเรียนไม่หมดอายุ เข้าถึงได้ บุคลากรรู้ตำแหน่ง","dual":1},{"id":"SAF-0025","d":"Refuelling and fuel storage practice on site complies with the SOP (bonding, no-smoking, drain checks).","rr":"","rk":"","ref":"MMSOP Fuel procedures","prev":"","hd":0,"how":"สังเกตการณ์","th":"การเติม/จัดเก็บเชื้อเพลิงในพื้นที่เป็นไปตาม SOP","dual":1},{"id":"SAF-0026","d":"Security controls protect aircraft and premises after hours (keys, tie-down, locks) per SOP.","rr":"","rk":"","ref":"MMSOP Key Control / Secure Aircraft","prev":""," <script>

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB_O40YpkQJJQIpx8gWNdiC9XrZ1o9SlHs",

const _Q=new URLSearchParams(location.search);
const AUDIT_ID=_Q.get('audit')||'safety-2026';   // รอบตรวจ: มาจาก ?audit= (Audit Plan) หรือค่า default ของ pack
const VIEW_ONLY=_Q.has('view');                    // ?view=1 = เปิดดูรายการตรวจอย่างเดียว ไม่บันทึก
const CAR_PREFIX = 'CAR-SAF';
// ═══════════════════════════════════════════
if(VIEW_ONLY){ document.body.classList.add('viewonly'); }
if(_Q.get('audit')||VIEW_ONLY){
  const sb=document.querySelector('header .sub');
  if(sb) sb.innerHTML+= (VIEW_ONLY?' &nbsp;|&nbsp; <b style="color:#FFD966">👁 โหมดเปิดดูรายการตรวจ (read-only)</b>':' &nbsp;|&nbsp; <b style="color:#9fd3a8">รอบตรวจ: '+AUDIT_ID.replace(/[<>"']/g,'')+'</b>');
}
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const MODS = DATA.modules, CATALOG = DATA.catalog;
const ALL = []; // flat items
MODS.forEach(m=>m.parts.forEach((p,pi)=>p.secs.forEach(s=>s.groups.forEach(g=>g.items.forEach(it=>{
  it._m=m.c; it._p=p.t; it._pi=pi; it._s=s.t; it._g=g; ALL.push(it);
})))));
const state = {};   // id -> {st:'S'|'U'|'NA', rm:'', ref:''}
let dirty=false;
const meta = {auditor:'', date: new Date().toISOString().slice(0,10), scope:'', note:''};
// ---- sync bookkeeping (no-op when FIREBASE_CONFIG is null) ----
const pending=new Set(); let pendingMeta=false, fbReady=false, fbUser=null;
function mark(id){ dirty=true; if(fbReady) pending.add(id); }
function markMeta(){ dirty=true; pendingMeta=true; }

function st(id){ return state[id] || null; }
function setSt(id, v, dim){
  dim = dim || 'st';
  const cur = state[id] || (state[id]={});
  cur[dim] = (cur[dim]===v) ? '' : v;
  mark(id);
  refreshItem(id); refreshCounts();
}
// per-item rolled-up status: dual items combine Doc(st) + Impl(st2)
function rollup(it){
  const s=st(it.id);
  if(!it.dual){ return (s&&s.st)?s.st:''; }
  const a=s&&s.st||'', b=s&&s.st2||'';
  if(a==='U'||b==='U') return 'U';      // any U = GAP, even if other dimension pending
  if(!a||!b) return '';                 // not fully checked
  if(a==='NA'&&b==='NA') return 'NA';
  return 'S';
}
function setRm(id,v){ (state[id]||(state[id]={})).rm=v; mark(id); }
function setRef(id,v){ (state[id]||(state[id]={})).ref=v; mark(id); }
function setSc(id,i,val){
  const s=(state[id]=state[id]||{}); s.sc=s.sc||{}; s.sc[i]=!!val; mark(id);
  const el=document.querySelector(`#it_${id} .chk[data-i="${i}"]`);
  if(el) el.classList.toggle('ck',!!val);
  const it=ALL.find(x=>x.id===id);
  const cht=document.querySelector(`#it_${id} .cht`);
  if(it&&it.chk&&cht) cht.textContent=`☑ รายการตรวจย่อย — ติ๊กเมื่อพบ/มีจริง (${Object.values(s.sc).filter(Boolean).length}/${it.chk.length})`;
  refreshCounts();
}
// ---------- photo evidence ----------
function addPhoto(id, inp){
  const files=[...inp.files]; inp.value='';
  files.forEach(f=>{
    const img=new Image();
    const rd=new FileReader();
    rd.onload=()=>{ img.onload=()=>{
        const MAX=1280;
        const sc=Math.min(1, MAX/Math.max(img.width,img.height));
        const cv=document.createElement('canvas');
        cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        const data=cv.toDataURL('image/jpeg',0.72);
        const s=(state[id]=state[id]||{}); s.ph=s.ph||[];
        s.ph.push({d:data, t:new Date().toISOString().slice(0,16).replace('T',' ')});
        mark(id); if(fbReady) uploadPhoto(id, s.ph.length-1);
        refreshItem(id); refreshCounts();
      }; img.src=rd.result; };
    rd.readAsDataURL(f);
  });
}
function delPhoto(id,i){
  const s=st(id); if(!s||!s.ph) return;
  s.ph.splice(i,1); mark(id); refreshItem(id);
}
function viewPhoto(id,i){
  const s=st(id); if(!s||!s.ph||!s.ph[i]) return;
  const ov=document.createElement('div'); ov.id='pview';
  ov.innerHTML=`<img src="${s.ph[i].d||s.ph[i].u}"><div style="color:#cdd8ea;font-size:12px">${id} · ${s.ph[i].t||''}</div><button onclick="document.getElementById('pview').remove()">ปิด</button>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function photoRowHTML(it){
  const s=st(it.id)||{}; const ph=s.ph||[];
  return `<div class="photorow">
    <button class="pbtn" onclick="document.getElementById('pf_${it.id}').click()">📷 ถ่ายรูป/แนบหลักฐาน${ph.length?` (${ph.length})`:''}</button>
    <input type="file" id="pf_${it.id}" accept="image/*" capture="environment" multiple class="hide" onchange="addPhoto('${it.id}',this)">
    ${ph.map((p,i)=>`<span class="thumb"><img src="${p.d||p.u}" onclick="viewPhoto('${it.id}',${i})"><button class="del" onclick="delPhoto('${it.id}',${i})">✕</button></span>`).join('')}
  </div>`;
}
function chkHTML(it){
  if(!it.chk) return '';
  const s=st(it.id)||{}; const sc=s.sc||{};
  return `<div class="chklist"><div class="cht">☑ รายการตรวจย่อย — ติ๊กเมื่อพบ/มีจริง (${Object.values(sc).filter(Boolean).length}/${it.chk.length})</div>
    ${it.chk.map((c,i)=>`<label class="chk ${sc[i]?'ck':''}" data-i="${i}">
      <input type="checkbox" ${sc[i]?'checked':''} onchange="setSc('${it.id}',${i},this.checked)"><span>${esc(c)}</span></label>`).join('')}
  </div>`;
}
function mxHTML(it){
  if(!it.mx || !it.mx.length) return '';
  return it.mx.map(m=>`<details class="mref"><summary>📖 คู่มือ: ${esc(m.t)}</summary>
    <div class="mx"><b>${esc(m.t)}</b><br>${esc(m.x||'— ดูรายละเอียดในคู่มือ —')}</div></details>`).join('');
}
function effRef(it){ const s=st(it.id);
  if(it.dual) return (s&&s.ref)||'';
  return (s&&s.ref!==undefined&&s.ref!==null&&s.ref!=='')?s.ref:it.ref; }

// ---------- counts ----------
function countOf(items){
  let c={S:0,U:0,NA:0,done:0,tot:items.length};
  items.forEach(it=>{const r=rollup(it); if(r){c[r]++; c.done++;}});
  return c;
}
function modItems(mc){ return ALL.filter(it=>it._m===mc); }
function refreshCounts(){
  const c=countOf(ALL);
  document.getElementById('ftxt').textContent = `ตรวจแล้ว ${c.done} / ${c.tot}`;
  document.getElementById('fbar').style.width = (100*c.done/c.tot)+'%';
  document.getElementById('fgap').textContent = 'GAP: '+c.U;
  document.querySelectorAll('[data-partcnt]').forEach(el=>{
    const [mc,pi]=el.dataset.partcnt.split('|');
    const items=ALL.filter(it=>it._m===mc&&it._pi==pi);
    const c=countOf(items);
    el.textContent=`${c.done}/${c.tot}` + (c.U?` · GAP ${c.U}`:'');
    const bar=document.querySelector(`[data-partbar="${el.dataset.partcnt}"]`);
    if(bar){bar.querySelector('i:not(.gap)').style.width=(100*c.S/c.tot)+'%';
            bar.querySelector('i.gap').style.width=(100*c.U/c.tot)+'%';}
  });
  document.querySelectorAll('[data-tabcnt]').forEach(el=>{
    const c=countOf(modItems(el.dataset.tabcnt));
    el.textContent=`${c.done}/${c.tot}`;
  });
}

function refreshItem(id){
  const el=document.getElementById('it_'+id);
  if(!el) return;
  const it=ALL.find(x=>x.id===id);
  const ae=document.activeElement;
  const typing=ae && el.contains(ae) && (ae.tagName==='TEXTAREA' ||
    (ae.tagName==='INPUT' && ['text','search','date',''].includes(ae.type||'')));
  if(typing){ // preserve focus while typing — update classes only
    const s=st(id)||{};
    el.classList.toggle('stU', it.dual ? (s.st==='U'||s.st2==='U') : s.st==='U');
    const s2=st(id)||{};
    const applyRow=(row,dim)=>{ row.querySelectorAll('.stbtn').forEach(b=>{
      b.classList.toggle('on', ['S','U','NA'].some(v=>b.classList.contains(v)&&s2[dim]===v)); }); };
    if(it.dual){ const rows=el.querySelectorAll('.dualrow');
      if(rows[0]) applyRow(rows[0],'st'); if(rows[1]) applyRow(rows[1],'st2');
    } else { const c=el.querySelector('.ctr'); if(c) applyRow(c,'st'); }
    return;
  }
  el.outerHTML=itemHTML(it);
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return esc(s).replace(/"/g,'&quot;');}

let filter={q:'', st:''};
function renderTabs(){
  const TABLBL={TM:'TM / PPL', SITE:'On-Site'};
  const t=[['dash','Dashboard'], ...DATA.modules.map(m=>[m.c, TABLBL[m.c]||m.c]), ['gap','GAP Report'],['car','CAR']];
  document.getElementById('tabs').innerHTML = t.map(([k,l])=>

}
function go(k){ curTab=k; render(); window.scrollTo(0,0); }

function matches(it){
  if(filter.st){
    const r=rollup(it);
    if(filter.st==='pend' && r) return false;
    if(filter.st!=='pend' && r!==filter.st) return false;
  }
  if(filter.q){
    const q=filter.q.toLowerCase();
    if(!(it.d.toLowerCase().includes(q) || (it.th||'').toLowerCase().includes(q) ||
         (it.how||'').toLowerCase().includes(q) || (it.rr||'').toLowerCase().includes(q) ||
         (it._g.subj||'').toLowerCase().includes(q) || effRef(it).toLowerCase().includes(q))) return false;
  }
  return true;
}

function renderModule(mc){
  const m=MODS.find(x=>x.c===mc);
  let h=`<div class="note"><b>${esc(m.t)}</b> — ${esc(m.th)}<br>
    เทียบกับคู่มือฉบับปัจจุบัน: <b>${esc(m.man)}</b> · ${esc(m.doc)} · แตะหัวข้อ Part เพื่อเปิดรายการตรวจ

    — ข้อที่ "เขียนไว้แต่ไม่ได้ทำ" ให้กด Doc=S, Impl=U แล้วระบุรายละเอียดใน Finding · แต่ละข้อมีชิปวิธีตรวจ (สังเกตการณ์/ตรวจบันทึก/สัมภาษณ์/ตรวจไขว้/ให้สาธิต) และคำแนะนำ "วิธีตรวจ" พร้อมแนวการสุ่มตัวอย่าง`:'')
    +`</div>`;
  h+=`<div class="toolbar">
    <input type="search" placeholder="ค้นหา / Search…" value="${escAttr(filter.q)}" onchange="filter.q=this.value;render()">
    ${[['','ทั้งหมด'],['pend','ยังไม่ตรวจ'],['U','GAP'],['S','S'],['NA','N/A']].map(([k,l])=>
      `<button class="fbtn ${filter.st===k?'on':''}" onclick="filter.st='${k}';render()">${l}</button>`).join('')}
  </div>`;
  m.parts.forEach((p,pi)=>{
    const key=`${mc}|${pi}`;
    const open = openParts.has(key);
    h+=`<div class="card ${open?'open':''}" id="part_${mc}_${pi}">
      <div class="hd" onclick="togglePart('${key}')">
        <span>${esc(p.t)}<span class="th">${esc(p.th)}</span></span>
        <span class="prog" data-partcnt="${key}"></span>
      </div>
      <div class="bar" data-partbar="${key}"><i style="width:0%"></i><i class="gap" style="width:0%"></i></div>
      <div class="body">${open?partBody(m,p,pi):''}</div>
    </div>`;
  });
  return h;
}
const openParts=new Set();
function togglePart(key){
  const [mc,pi]=key.split('|');
  if(openParts.has(key)) openParts.delete(key); else openParts.add(key);
  const card=document.getElementById(`part_${mc}_${pi}`);
  if(!card) return;
  card.classList.toggle('open');
  const body=card.querySelector('.body');
  if(card.classList.contains('open') && !body.dataset.done){
    const m=MODS.find(x=>x.c===mc);
    body.innerHTML=partBody(m,m.parts[pi],+pi);
    body.dataset.done=1;
  }
  refreshCounts();
}
function partBody(m,p,pi){
  let h='';
  p.secs.forEach((s,si)=>{
    const secItems=[]; s.groups.forEach(g=>g.items.forEach(it=>{if(matches(it))secItems.push(it);}));
    if(!secItems.length && (filter.q||filter.st)) return;
    if(s.t) h+=`<div class="sec"><span>${esc(s.t)}</span>
       <button class="bulk" onclick="bulkSec('${m.c}',${pi},${si})">S ✓ ทั้งหมดในหมวดนี้</button></div>`;
    s.groups.forEach((g,gi)=>{
      const its=g.items.filter(matches);
      if(!its.length) return;
      h+=`<div class="grp"><div class="ghd">
        <span>${g.n?`<span class="gno">${esc(g.n)}</span>`:''} <b>${esc(g.subj)}</b></span>
        <button class="bulk" onclick="bulkGrp('${m.c}',${pi},${si},${gi})">S ✓ ทั้งกลุ่ม</button>
      </div>
      ${g.how?`<details class="mref how2" style="margin:6px 8px"><summary>🔎 วิธีตรวจกลุ่มนี้ / How to verify</summary><div class="mx">${esc(g.how)}</div></details>`:''}`;
      its.forEach(it=>h+=itemHTML(it));
      h+=`</div>`;
    });
  });
  return h || '<p style="color:#889;padding:8px">— ไม่มีรายการตรงเงื่อนไข —</p>';
}
function bulkOne(it){
  const s=(state[it.id]=state[it.id]||{});
  if(!s.st) s.st='S';
  if(it.dual && !s.st2) s.st2='S';
  mark(it.id);
}
function bulkGrp(mc,pi,si,gi){
  MODS.find(x=>x.c===mc).parts[pi].secs[si].groups[gi].items.forEach(bulkOne);
  dirty=true; rerenderOpen(mc,pi); refreshCounts();
}
function bulkSec(mc,pi,si){
  MODS.find(x=>x.c===mc).parts[pi].secs[si].groups.forEach(g=>g.items.forEach(bulkOne));
  dirty=true; rerenderOpen(mc,pi); refreshCounts();
}
function rerenderOpen(mc,pi){
  const card=document.getElementById(`part_${mc}_${pi}`);
  if(card&&card.classList.contains('open')){
    const m=MODS.find(x=>x.c===mc);
    card.querySelector('.body').innerHTML=partBody(m,m.parts[pi],pi);
  }
}

    <h3 style="color:#fff">TOTAL</h3><div class="th" style="color:#cdd8ea">ทุกคู่มือรวมกัน</div>

  });

  return h;
}

// ================= CAR (Corrective Action Request) =================
const gapSel=new Set();
function carOf(id){ const s=st(id); return (s&&s.car)||null; }
function today(){ return new Date().toISOString().slice(0,10); }
function uName(){ return (typeof fbUser!=='undefined'&&fbUser)?(fbUser.displayName||fbUser.email||''):(meta.auditor||''); }
function nextCarNo(){
  let mx=0;
  ALL.forEach(it=>{const c=carOf(it.id); if(c&&c.no){const m=c.no.match(/(\d+)$/); if(m) mx=Math.max(mx,+m[1]);}});
  return `${CAR_PREFIX}-${(meta.date||today()).slice(0,4)}-${String(mx+1).padStart(3,'0')}`;
}
function logCar(c,msg){ c.hist=((c.hist||'')+`\n${today()} ${msg}`).trim(); }
function toggleSel(id,on){ if(on) gapSel.add(id); else gapSel.delete(id);
  const n=document.getElementById('selcnt'); if(n) n.textContent=gapSel.size; }
function assignSelected(sendMail){
  const name=document.getElementById('as_name').value.trim();
  const email=document.getElementById('as_email').value.trim();
  const due=document.getElementById('as_due').value;
  if(!gapSel.size){ alert('ยังไม่ได้เลือกรายการ — ติ๊กช่องหน้า Finding ที่ต้องการมอบหมายก่อน'); return; }
  if(!name){ alert('กรุณากรอกชื่อผู้รับผิดชอบ'); return; }
  const assigned=[];
  gapSel.forEach(id=>{
    const s=(state[id]=state[id]||{});
    const c=(s.car=s.car||{});
    if(!c.no) c.no=nextCarNo();
    c.as=name; c.ae=email; c.due=due; c.cast='A'; c.iby=uName()||meta.auditor||'';
    logCar(c,`มอบหมายให้ ${name}${due?` กำหนดเสร็จ ${due}`:''}${c.iby?` · โดย ${c.iby}`:''}`);
    assigned.push(id);
  });
  assigned.forEach(mark);
  if(sendMail) openMail(assigned, name, email, due);
  gapSel.clear(); render();
}
function mailBody(ids, name, due){
  const L=[`เรียน ${name||'ผู้รับผิดชอบ'}`,'',
   `ตามผลการตรวจติดตามภายใน (Internal Audit – GAP Analysis, TCAR-ORA) วันที่ ${meta.date||today()}`,
   `ขอมอบหมายให้ดำเนินการแก้ไขข้อบกพร่อง (CAR) จำนวน ${ids.length} รายการ ดังนี้`,''];
  ids.forEach(id=>{
    const it=ALL.find(x=>x.id===id); const c=carOf(id)||{};
    L.push(`• ${c.no||''} [${id}] ${it.d.slice(0,140)}`);
    L.push(`  ประเภท: ${gapType(it)}${(st(id)||{}).rm?` | รายละเอียด: ${(st(id)||{}).rm.slice(0,120)}`:''}`);
    L.push(`  กำหนดเสร็จ: ${c.due||due||'-'}`);
    L.push('');
  });
  L.push('ขอให้วิเคราะห์สาเหตุราก (root cause) กำหนด corrective action และรายงานผลกลับตามแบบฟอร์ม CAR ที่แนบ ภายในกำหนด','');
  L.push(`ผู้ตรวจ: ${meta.auditor||'-'}`,'D-0507 Flight Training Co., Ltd. | D-0507-IAC-001');
  return L.join('\n');
}
function openMail(ids, name, email, due){
  const sub=`[D-0507] CAR Assignment — Internal Audit ${meta.date||today()} (${ids.length} รายการ)`;
  const body=mailBody(ids, name, due);
  const url=`mailto:${encodeURIComponent(email||'')}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
  if(url.length>7500){
    navigator.clipboard&&navigator.clipboard.writeText(`เรื่อง: ${sub}\n\n${body}`);
    alert('รายการเยอะเกินกว่าจะเปิดในอีเมลโดยตรง — คัดลอกข้อความลงคลิปบอร์ดแล้ว วางในอีเมลได้เลย และอย่าลืมแนบไฟล์ CAR Form');
  } else location.href=url;
}
function copyMailSel(){
  const ids=[...gapSel];

let SIGCTX=null, SIGQ=null;
const SIG_ROLES={resp:'Responsible Person / ผู้รับผิดชอบ', aud:'Auditor / ผู้ตรวจ', cmm:'Compliance Monitoring Manager'};
function openSig(idOrIds, role, cb){
  const ids=Array.isArray(idOrIds)?idOrIds:[idOrIds];
  const c=carOf(ids[0]); if(!c) return;
  SIGQ={ids, role, cb:cb||null};
  const names={resp:c.as||'', aud:uName()||meta.auditor||'', cmm:''};
  const prev=(c.sg&&c.sg[role])||null;

  w.innerHTML=`<div class="sigbox">
    <b style="color:var(--navy)">✍ ลงชื่อ — ${SIG_ROLES[role]}</b>${ids.length>1?`<span class="carpill A" style="margin-left:8px">ใช้กับ ${ids.length} CAR ที่เลือก</span>`:''}
    <div style="margin:8px 0">ชื่อ-นามสกุล: <input id="sig_n" class="ca-sm" style="width:62%" value="${esc((prev&&prev.n)||names[role]||'')}" placeholder="ชื่อผู้ลงนาม"></div>
    <canvas id="sig_c" width="540" height="180"></canvas>
    <div style="color:#7a8798;font-size:11px;margin-top:3px">เซ็นในกรอบด้วยนิ้ว / Apple Pencil / เมาส์</div>
    <div style="margin-top:10px;text-align:right">
      <button class="carbtn" onclick="sigClear()">ล้าง</button>
      <button class="carbtn" onclick="document.getElementById('sigwrap').remove()">ยกเลิก</button>
      <button class="carbtn v" onclick="sigSave()">✔ บันทึกลายเซ็น</button>
    </div></div>`;
  document.body.appendChild(w);
  const cv=document.getElementById('sig_c'); const ctx=cv.getContext('2d');
  ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#16305e';
  let drawing=false, drew=false;
  const pos=e=>{const r=cv.getBoundingClientRect(); return [(e.clientX-r.left)*cv.width/r.width,(e.clientY-r.top)*cv.height/r.height];};
  cv.onpointerdown=e=>{drawing=true; drew=true; cv.setPointerCapture(e.pointerId); const p=pos(e); ctx.beginPath(); ctx.moveTo(p[0],p[1]); ctx.lineTo(p[0]+.1,p[1]+.1); ctx.stroke(); e.preventDefault();};
  cv.onpointermove=e=>{if(!drawing)return; const p=pos(e); ctx.lineTo(p[0],p[1]); ctx.stroke(); e.preventDefault();};
  cv.onpointerup=cv.onpointercancel=()=>{drawing=false;};
  SIGCTX={cv,ctx,hasInk:()=>drew,resetInk:()=>{drew=false;}};
}

function gapType(it){
  const s=st(it.id)||{};
  if(!it.dual) return s.st==='U' ? 'Doc GAP – ไม่มี/ไม่ครบในคู่มือ' : '';
  const d=s.st==='U', i=s.st2==='U';
  if(d&&i) return 'Doc + Implementation GAP – ไม่มีในคู่มือและไม่ได้ปฏิบัติ';
  if(d) return 'Doc GAP – ไม่มี/ไม่ครบในคู่มือ';
  if(i) return 'Implementation GAP – เขียนไว้แต่ไม่ได้ปฏิบัติ/หลักฐานไม่พอ';
  return '';
}

function stamp(){ return (meta.date||new Date().toISOString().slice(0,10)).replace(/-/g,''); }
function dl(name, text, type){
  const b=new Blob(["﻿"+text],{type});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

function importJSON(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      Object.assign(meta, d.meta||{});
      Object.keys(state).forEach(k=>delete state[k]);
      Object.assign(state, d.state||{});
      if(fbReady){ Object.keys(state).forEach(k=>pending.add(k)); pendingMeta=true; }
      dirty=false; render();
      alert('โหลดความคืบหน้าเรียบร้อย ('+Object.keys(d.state||{}).length+' รายการ)');
    }catch(e){ alert('ไฟล์ไม่ถูกต้อง: '+e.message); } };
  r.readAsText(f);
  inp.value='';
}

function render(){
  renderTabs();
  const el=document.getElementById('main');
  if(curTab==='dash') el.innerHTML=renderDash();
  else if(curTab==='gap') el.innerHTML=renderGap();
  else if(curTab==='car') el.innerHTML=renderCar();
  else el.innerHTML=renderModule(curTab);
  refreshCounts();
}
window.addEventListener('beforeunload',e=>{ if(dirty && !fbReady){e.preventDefault(); e.returnValue='';} });
render();

// ═══════════════════ FIREBASE SERVER SYNC ═══════════════════
let FB={};
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
function syncStatus(txt,color){ const el=document.getElementById('syncst'); if(el){ el.textContent=txt; el.style.color=color||'var(--navy)'; } }
async function initFirebase(){
  if(!FIREBASE_CONFIG) return;
  const f=document.querySelector('footer.app');
  f.insertAdjacentHTML('beforeend','<span id="syncst" style="font-size:11px">…</span><button id="fbout" class="carbtn hide" onclick="firebase.auth().signOut()">ออก</button>');
  syncStatus('⏳ กำลังเชื่อมต่อ…');
  try{
    const V='10.12.2';
    await loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-app-compat.js`);
    await Promise.all([
      loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-auth-compat.js`),
      loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore-compat.js`),
      loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-storage-compat.js`),
    ]);
    firebase.initializeApp(FIREBASE_CONFIG);
    FB.db=firebase.firestore(); FB.st=firebase.storage();
    firebase.auth().onAuthStateChanged(u=>{
      fbUser=u;
      document.getElementById('loginov')?.remove();
      document.getElementById('fbout')?.classList.toggle('hide',!u);
      if(u){ startSync(); }
      else if(VIEW_ONLY){ fbReady=false; syncStatus('👁 โหมดเปิดดูรายการตรวจ — ไม่บันทึกข้อมูล','var(--blue)'); }
      else { fbReady=false; syncStatus('○ ยังไม่ได้เข้าสู่ระบบ','#C00000'); showLogin(); }
    });
  }catch(e){ syncStatus('⚠ เชื่อมต่อไม่ได้ — โหมดออฟไลน์','#C00000'); console.error(e); }
}
function showLogin(){
  if(document.getElementById('loginov')) return;
  const ov=document.createElement('div');
  ov.id='loginov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(15,25,45,.94);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML=`<div style="background:#fff;border-radius:14px;max-width:400px;width:100%;padding:24px">
    <h2 style="color:var(--navy);margin:0 0 4px;font-size:18px">D-0507 Internal Audit</h2>
    <p style="color:#667;font-size:13px;margin:0 0 16px">เข้าสู่ระบบเพื่อใช้งานร่วมกับทีม (ข้อมูล sync อัตโนมัติ)</p>
    <button class="abtn" style="width:100%;margin-bottom:14px" onclick="fbGoogle()">🔵 เข้าสู่ระบบด้วย Google</button>
    <div style="border-top:1px solid #e2e8f0;margin:10px 0;text-align:center;color:#99a;font-size:11px;line-height:0"><span style="background:#fff;padding:0 8px">หรือ</span></div>
    <input id="li_em" type="email" placeholder="อีเมล" style="width:100%;min-height:44px;border:1px solid #c8d2e0;border-radius:8px;padding:8px 12px;margin:8px 0;box-sizing:border-box">
    <input id="li_pw" type="password" placeholder="รหัสผ่าน" style="width:100%;min-height:44px;border:1px solid #c8d2e0;border-radius:8px;padding:8px 12px;margin:0 0 12px;box-sizing:border-box">
    <div style="display:flex;gap:8px">
      <button class="abtn sec2" style="flex:1" onclick="fbEmail(false)">เข้าสู่ระบบ</button>
      <button class="fbtn" style="flex:1" onclick="fbEmail(true)">สมัครใหม่</button>
    </div>
    <p id="li_err" style="color:var(--red);font-size:12px;min-height:16px;margin:8px 0 0"></p>
  </div>`;
  document.body.appendChild(ov);
}
function fbErr(e){ const el=document.getElementById('li_err'); if(el) el.textContent=e.message||e; }
function fbGoogle(){ firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(fbErr); }
function fbEmail(create){
  const em=document.getElementById('li_em').value.trim(), pw=document.getElementById('li_pw').value;
  (create?firebase.auth().createUserWithEmailAndPassword(em,pw):firebase.auth().signInWithEmailAndPassword(em,pw)).catch(fbErr);
}
function itemsCol(){ return FB.db.collection('audits').doc(AUDIT_ID).collection('items'); }
function cleanForWrite(s){
  const o=JSON.parse(JSON.stringify(s||{}));
  if(o.ph) o.ph=o.ph.filter(p=>p.u).map(p=>({u:p.u,t:p.t||''}));   // only Storage-uploaded photos sync
  return o;
}
function startSync(){
  fbReady=true;
  syncStatus('☁ '+(fbUser.email||'signed in'),'var(--green)');
  // meta
  FB.db.collection('audits').doc(AUDIT_ID).onSnapshot(d=>{
    if(pendingMeta||!d.exists) return;
    const m=d.data().meta; if(m){ Object.assign(meta,m); if(curTab==='dash') render(); }
  });
  // items realtime
  FB.unsub && FB.unsub();
  FB.unsub=itemsCol().onSnapshot(snap=>{
    let changed=0;
    snap.docChanges().forEach(ch=>{
      const id=ch.doc.id;
      if(pending.has(id)) return;               // local edit wins until flushed
      const {t,u,...rest}=ch.doc.data();
      const loc=state[id];
      // keep local-only dataURL photos
      if(loc&&loc.ph){ const localOnly=loc.ph.filter(p=>p.d&&!p.u); rest.ph=[...(rest.ph||[]),...localOnly]; }
      state[id]=rest; changed++;
      refreshItem(id);
    });
    if(changed){ refreshCounts(); if(['gap','car','dash'].includes(curTab)) render(); }
  },e=>{ syncStatus('⚠ sync error','#C00000'); console.error(e); });
  // flusher
  FB.timer && clearInterval(FB.timer);
  FB.timer=setInterval(flush, 2500);
  setTimeout(pushSummary, 6000);   // อัปเดตสรุปให้ Portal หลังโหลดข้อมูลรอบแรก
}
function pushSummary(){
  if(!fbReady||!fbUser) return;
  try{
    const gaps=ALL.filter(it=>{const s=st(it.id)||{};return s.st==='U'||(it.dual&&s.st2==='U');}).length;
    const done=ALL.filter(it=>rollup(it)).length;
    const cars=ALL.filter(it=>carOf(it.id)&&carOf(it.id).no);
    const open=cars.filter(it=>carOf(it.id).cast!=='V').length;
    FB.db.collection('audits').doc(AUDIT_ID).set({sum:{done:done,gap:gaps,total:ALL.length,car:cars.length,carOpen:open,at:new Date().toISOString()}},{merge:true}).catch(console.error);
  }catch(e){ console.error(e); }
}
async function flush(){
  if(!fbReady||!fbUser) return;
  if(pendingMeta){
    pendingMeta=false;
    FB.db.collection('audits').doc(AUDIT_ID).set({meta:{auditor:meta.auditor,date:meta.date,scope:meta.scope},
      t:firebase.firestore.FieldValue.serverTimestamp(), u:fbUser.email||''},{merge:true}).catch(console.error);
  }
  if(!pending.size) return;
  const ids=[...pending]; pending.clear();
  const batch=FB.db.batch();
  ids.forEach(id=>{
    batch.set(itemsCol().doc(id), {...cleanForWrite(state[id]),
      t:firebase.firestore.FieldValue.serverTimestamp(), u:fbUser.email||''}, {merge:false});
  });
  try{ await batch.commit(); syncStatus('☁ บันทึกแล้ว '+new Date().toTimeString().slice(0,5)+' · '+(fbUser.email||''),'var(--green)'); pushSummary(); }
  catch(e){ ids.forEach(id=>pending.add(id)); syncStatus('⚠ บันทึกไม่สำเร็จ — จะลองใหม่','#C00000'); console.error(e); }
}
async function uploadPhoto(id, idx){
  try{
    const s=state[id]; const p=s.ph[idx]; if(!p||!p.d) return;
    const ref=FB.st.ref().child(`audits/${AUDIT_ID}/photos/${id}/${Date.now()}_${idx}.jpg`);
    await ref.putString(p.d,'data_url');
    p.u=await ref.getDownloadURL(); delete p.d;
    mark(id); refreshItem(id);
  }catch(e){ console.error('photo upload failed',e); }
}
initFirebase();
