  storageBucket: "d0507-audit.firebasestorage.app", messagingSenderId: "...", appId: "..."
}; */
const AUDIT_ID = 'audit-2026';   // เปลี่ยนเมื่อขึ้นรอบตรวจใหม่ เช่น 'audit-2027'
// ═══════════════════════════════════════════
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const MODS = DATA.modules, CATALOG = DATA.catalog;
const ALL = []; // flat items
MODS.forEach(m=>m.parts.forEach((p,pi)=>p.secs.forEach(s=>s.groups.forEach(g=>g.items.forEach(it=>{
  it._m=m.c; it._p=p.t; it._pi=pi; it._s=s.t; it._g=g; ALL.push(it);
})))));
const state = {};   // id -> {st:'S'|'U'|'NA', rm:'', ref:''}
let dirty=false;
const meta = {auditor:'', date: new Date().toISOString().slice(0,10), scope:'', note:''};
// ---- sync bookkeeping (no-op when FIREBASE_CONFIG is null) ----
const pending=new Set(); let pendingMeta=false, fbReady=false, fbUser=null;
function mark(id){ dirty=true; if(fbReady) pending.add(id); }
function markMeta(){ dirty=true; pendingMeta=true; }

function st(id){ return state[id] || null; }
function setSt(id, v, dim){
  dim = dim || 'st';
  const cur = state[id] || (state[id]={});
  cur[dim] = (cur[dim]===v) ? '' : v;
  mark(id);
  refreshItem(id); refreshCounts();
}
// per-item rolled-up status: dual items combine Doc(st) + Impl(st2)
function rollup(it){
  const s=st(it.id);
  if(!it.dual){ return (s&&s.st)?s.st:''; }
  const a=s&&s.st||'', b=s&&s.st2||'';
  if(a==='U'||b==='U') return 'U';      // any U = GAP, even if other dimension pending
  if(!a||!b) return '';                 // not fully checked
  if(a==='NA'&&b==='NA') return 'NA';
  return 'S';
}
function setRm(id,v){ (state[id]||(state[id]={})).rm=v; mark(id); }
function setRef(id,v){ (state[id]||(state[id]={})).ref=v; mark(id); }
function setSc(id,i,val){
  const s=(state[id]=state[id]||{}); s.sc=s.sc||{}; s.sc[i]=!!val; mark(id);
  const el=document.querySelector(`#it_${id} .chk[data-i="${i}"]`);
  if(el) el.classList.toggle('ck',!!val);
  const it=ALL.find(x=>x.id===id);
  const cht=document.querySelector(`#it_${id} .cht`);
  if(it&&it.chk&&cht) cht.textContent=`☑ รายการตรวจย่อย — ติ๊กเมื่อพบ/มีจริง (${Object.values(s.sc).filter(Boolean).length}/${it.chk.length})`;
  refreshCounts();
}
// ---------- photo evidence ----------
function addPhoto(id, inp){
  const files=[...inp.files]; inp.value='';
  files.forEach(f=>{
    const img=new Image();
    const rd=new FileReader();
    rd.onload=()=>{ img.onload=()=>{
        const MAX=1280;
        const sc=Math.min(1, MAX/Math.max(img.width,img.height));
        const cv=document.createElement('canvas');
        cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        const data=cv.toDataURL('image/jpeg',0.72);
        const s=(state[id]=state[id]||{}); s.ph=s.ph||[];
        s.ph.push({d:data, t:new Date().toISOString().slice(0,16).replace('T',' ')});
        mark(id); if(fbReady) uploadPhoto(id, s.ph.length-1);
        refreshItem(id); refreshCounts();
      }; img.src=rd.result; };
    rd.readAsDataURL(f);
  });
}
function delPhoto(id,i){
  const s=st(id); if(!s||!s.ph) return;
  s.ph.splice(i,1); mark(id); refreshItem(id);
}
function viewPhoto(id,i){
  const s=st(id); if(!s||!s.ph||!s.ph[i]) return;
  const ov=document.createElement('div'); ov.id='pview';
  ov.innerHTML=`<img src="${s.ph[i].d||s.ph[i].u}"><div style="color:#cdd8ea;font-size:12px">${id} · ${s.ph[i].t||''}</div><button onclick="document.getElementById('pview').remove()">ปิด</button>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function photoRowHTML(it){
  const s=st(it.id)||{}; const ph=s.ph||[];
  return `<div class="photorow">
    <button class="pbtn" onclick="document.getElementById('pf_${it.id}').click()">📷 ถ่ายรูป/แนบหลักฐาน${ph.length?` (${ph.length})`:''}</button>
    <input type="file" id="pf_${it.id}" accept="image/*" capture="environment" multiple class="hide" onchange="addPhoto('${it.id}',this)">
    ${ph.map((p,i)=>`<span class="thumb"><img src="${p.d||p.u}" onclick="viewPhoto('${it.id}',${i})"><button class="del" onclick="delPhoto('${it.id}',${i})">✕</button></span>`).join('')}
  </div>`;
}
function chkHTML(it){
  if(!it.chk) return '';
  const s=st(it.id)||{}; const sc=s.sc||{};
  return `<div class="chklist"><div class="cht">☑ รายการตรวจย่อย — ติ๊กเมื่อพบ/มีจริง (${Object.values(sc).filter(Boolean).length}/${it.chk.length})</div>
    ${it.chk.map((c,i)=>`<label class="chk ${sc[i]?'ck':''}" data-i="${i}">
      <input type="checkbox" ${sc[i]?'checked':''} onchange="setSc('${it.id}',${i},this.checked)"><span>${esc(c)}</span></label>`).join('')}
  </div>`;
}
function mxHTML(it){
  if(!it.mx || !it.mx.length) return '';
  return it.mx.map(m=>`<details class="mref"><summary>📖 คู่มือ: ${esc(m.t)}</summary>
    <div class="mx"><b>${esc(m.t)}</b><br>${esc(m.x||'— ดูรายละเอียดในคู่มือ —')}</div></details>`).join('');
}
function effRef(it){ const s=st(it.id);
  if(it.dual) return (s&&s.ref)||'';
  return (s&&s.ref!==undefined&&s.ref!==null&&s.ref!=='')?s.ref:it.ref; }

// ---------- counts ----------
function countOf(items){
  let c={S:0,U:0,NA:0,done:0,tot:items.length};
  items.forEach(it=>{const r=rollup(it); if(r){c[r]++; c.done++;}});
  return c;
}
function modItems(mc){ return ALL.filter(it=>it._m===mc); }
function refreshCounts(){
  const c=countOf(ALL);
  document.getElementById('ftxt').textContent = `ตรวจแล้ว ${c.done} / ${c.tot}`;
  document.getElementById('fbar').style.width = (100*c.done/c.tot)+'%';
  document.getElementById('fgap').textContent = 'GAP: '+c.U;
  document.querySelectorAll('[data-partcnt]').forEach(el=>{
    const [mc,pi]=el.dataset.partcnt.split('|');
    const items=ALL.filter(it=>it._m===mc&&it._pi==pi);
    const c=countOf(items);
    el.textContent=`${c.done}/${c.tot}` + (c.U?` · GAP ${c.U}`:'');
    const bar=document.querySelector(`[data-partbar="${el.dataset.partcnt}"]`);
    if(bar){bar.querySelector('i:not(.gap)').style.width=(100*c.S/c.tot)+'%';
            bar.querySelector('i.gap').style.width=(100*c.U/c.tot)+'%';}
  });
  document.querySelectorAll('[data-tabcnt]').forEach(el=>{
    const c=countOf(modItems(el.dataset.tabcnt));
    el.textContent=`${c.done}/${c.tot}`;
  });
}

// ---------- item rendering ----------
function chipPrev(p){
  if(p==='Y') return '<span class="chip prevY">ATO เดิม: Yes</span>';
  if(p==='N') return '<span class="chip prevN">ATO เดิม: No</span>';
  if(p==='NA') return '<span class="chip prevNA">ATO เดิม: N/A</span>';
  return '';
}
const MT_LABEL={OBS:'👁 สังเกตการณ์ Observe', DOC:'📄 ตรวจบันทึก Records', INT:'💬 สัมภาษณ์ Interview', XCK:'🔀 ตรวจไขว้ Cross-check', DEMO:'🎬 ให้สาธิต Demonstrate'};
function btnRow(it,dim,s){
  const v=s[dim]||'';
  return `<button class="stbtn S ${v==='S'?'on':''}" onclick="setSt('${it.id}','S','${dim}')">S ✓</button>
    <button class="stbtn U ${v==='U'?'on':''}" onclick="setSt('${it.id}','U','${dim}')">U ✗</button>
    <button class="stbtn NA ${v==='NA'?'on':''}" onclick="setSt('${it.id}','NA','${dim}')">N/A</button>`;
}
function itemHTML(it){
  const s=st(it.id)||{};
  const isU = it.dual ? (s.st==='U'||s.st2==='U') : s.st==='U';
  if(it.dual){
    return `<div class="item ${isU?'stU':''}" id="it_${it.id}" data-id="${it.id}">
      <p class="d" ${it.mx&&it.mx.length?`title="${escAttr(it.mx[0].t+' — '+(it.mx[0].x||'').slice(0,300))}"`:''}>${esc(it.d)}</p>
      ${it.th?`<p class="thd">${esc(it.th)}</p>`:''}
      <div class="meta">
        ${it.rr?`<span class="chip rr">${esc(it.rr)}</span>`:''}
        ${(it.mt||[]).map(m=>`<span class="chip mt">${MT_LABEL[m]||m}</span>`).join('')}
        <span class="chip">${it.id}</span>
      </div>
      ${it.how?`<div class="how"><b>วิธีตรวจ / How to verify:</b> ${esc(it.how)}</div>`:''}
      ${mxHTML(it)}
      ${chkHTML(it)}
      <div class="dualrow"><span class="dlab">📖 คู่มือ<br>Documented</span>${btnRow(it,'st',s)}
        <span class="dhint">เขียนไว้ในคู่มือครบถ้วน?</span></div>
      <div class="dualrow"><span class="dlab">⚙️ ปฏิบัติจริง<br>Implemented</span>${btnRow(it,'st2',s)}
        <span class="dhint">ทำจริง มีหลักฐาน?</span></div>
      <div class="ctr">
        <input class="refin" placeholder="Evidence / หลักฐานที่พบ + อ้างอิงคู่มือ (${escAttr(it.ref||'')})" value="${escAttr(effRef(it)===it.ref?'':effRef(it))}"
          onchange="setRef('${it.id}',this.value)">
      </div>
      ${photoRowHTML(it)}
      <textarea class="rmk" placeholder="Finding — ระบุ GAP: ไม่มีในคู่มือ / เขียนไว้แต่ไม่ได้ปฏิบัติ / ปฏิบัติต่างจากคู่มือ + รายละเอียด"
        onchange="setRm('${it.id}',this.value)">${esc(s.rm||'')}</textarea>
    </div>`;
  }
  return `<div class="item ${it.hd?'hdRow':''} ${isU?'stU':''}" id="it_${it.id}" data-id="${it.id}">
    <p class="d" ${it.mx&&it.mx.length?`title="${escAttr(it.mx[0].t+' — '+(it.mx[0].x||'').slice(0,300))}"`:''}>${esc(it.d)}</p>
    <div class="meta">
      ${it.rr?`<span class="chip rr">${esc(it.rr)}</span>`:''}
      ${chipPrev(it.prev)}
      <span class="chip">${it.id}</span>
    </div>
    ${it.how?`<details class="mref how2"><summary>🔎 วิธีตรวจ / How to verify</summary><div class="mx">${esc(it.how)}</div></details>`:''}
    ${mxHTML(it)}
    ${chkHTML(it)}
    <div class="ctr">
      ${btnRow(it,'st',s)}
      <input class="refin" placeholder="Reference (Section/Page/Topic)" value="${escAttr(effRef(it))}"
        onchange="setRef('${it.id}',this.value)">
    </div>
    ${photoRowHTML(it)}

function refreshItem(id){
  const el=document.getElementById('it_'+id);

  const typing=ae && el.contains(ae) && (ae.tagName==='TEXTAREA' ||
    (ae.tagName==='INPUT' && ['text','search','date',''].includes(ae.type||'')));
  if(typing){ // preserve focus while typing — update classes only
    const s=st(id)||{};
    el.classList.toggle('stU', it.dual ? (s.st==='U'||s.st2==='U') : s.st==='U');
    const s2=st(id)||{};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderTabs(){

function matches(it){
  if(filter.st){
    const r=rollup(it);
    if(filter.st==='pend' && r) return false;
    if(filter.st!=='pend' && r!==filter.st) return false;
  }
  if(filter.q){
    const q=filter.q.toLowerCase();
    if(!(it.d.toLowerCase().includes(q) || (it.th||'').toLowerCase().includes(q) ||
         (it.how||'').toLowerCase().includes(q) || (it.rr||'').toLowerCase().includes(q) ||
         (it._g.subj||'').toLowerCase().includes(q) || effRef(it).toLowerCase().includes(q))) return false;
  }
  return true;
}

        <span class="prog" data-partcnt="${key}"></span>
      </div>

      <div class="body">${open?partBody(m,p,pi):''}</div>
    </div>`;
  });
  return h;
}
const openParts=new Set();
function togglePart(key){
  const [mc,pi]=key.split('|');
  if(openParts.has(key)) openParts.delete(key); else openParts.add(key);
  const card=document.getElementById(`part_${mc}_${pi}`);
  if(!card) return;
  card.classList.toggle('open');
  const body=card.querySelector('.body');
  if(card.classList.contains('open') && !body.dataset.done){
    const m=MODS.find(x=>x.c===mc);
    body.innerHTML=partBody(m,m.parts[pi],+pi);
    body.dataset.done=1;
  }
  refreshCounts();
}
function partBody(m,p,pi){
  let h='';
  p.secs.forEach((s,si)=>{
    const secItems=[]; s.groups.forEach(g=>g.items.forEach(it=>{if(matches(it))secItems.push(it);}));
    if(!secItems.length && (filter.q||filter.st)) return;
    if(s.t) h+=`<div class="sec"><span>${esc(s.t)}</span>
       <button class="bulk" onclick="bulkSec('${m.c}',${pi},${si})">S ✓ ทั้งหมดในหมวดนี้</button></div>`;
    s.groups.forEach((g,gi)=>{
      const its=g.items.filter(matches);
      if(!its.length) return;
      h+=`<div class="grp"><div class="ghd">
        <span>${g.n?`<span class="gno">${esc(g.n)}</span>`:''} <b>${esc(g.subj)}</b></span>
        <button class="bulk" onclick="bulkGrp('${m.c}',${pi},${si},${gi})">S ✓ ทั้งกลุ่ม</button>
      </div>
      ${g.how?`<details class="mref how2" style="margin:6px 8px"><summary>🔎 วิธีตรวจกลุ่มนี้ / How to verify</summary><div class="mx">${esc(g.how)}</div></details>`:''}`;
      its.forEach(it=>h+=itemHTML(it));
      h+=`</div>`;
    });
  });
  return h || '<p style="color:#889;padding:8px">— ไม่มีรายการตรงเงื่อนไข —</p>';
}
function bulkOne(it){
  const s=(state[it.id]=state[it.id]||{});
  if(!s.st) s.st='S';
  if(it.dual && !s.st2) s.st2='S';
  mark(it.id);
}
function bulkGrp(mc,pi,si,gi){
  MODS.find(x=>x.c===mc).parts[pi].secs[si].groups[gi].items.forEach(bulkOne);
  dirty=true; rerenderOpen(mc,pi); refreshCounts();
}
function bulkSec(mc,pi,si){
  MODS.find(x=>x.c===mc).parts[pi].secs[si].groups.forEach(g=>g.items.forEach(bulkOne));
  dirty=true; rerenderOpen(mc,pi); refreshCounts();
}
function rerenderOpen(mc,pi){
  const card=document.getElementById(`part_${mc}_${pi}`);
  if(card&&card.classList.contains('open')){
    const m=MODS.find(x=>x.c===mc);
    card.querySelector('.body').innerHTML=partBody(m,m.parts[pi],pi);
  }
}

// ================= CAR (Corrective Action Request) =================
const gapSel=new Set();
function carOf(id){ const s=st(id); return (s&&s.car)||null; }
function today(){ return new Date().toISOString().slice(0,10); }
function nextCarNo(){
  let mx=0;
  ALL.forEach(it=>{const c=carOf(it.id); if(c&&c.no){const m=c.no.match(/(\d+)$/); if(m) mx=Math.max(mx,+m[1]);}});
  return `CAR-${(meta.date||today()).slice(0,4)}-${String(mx+1).padStart(3,'0')}`;
}
function logCar(c,msg){ c.hist=((c.hist||'')+`\n${today()} ${msg}`).trim(); }
function toggleSel(id,on){ if(on) gapSel.add(id); else gapSel.delete(id);
  const n=document.getElementById('selcnt'); if(n) n.textContent=gapSel.size; }
function assignSelected(sendMail){
  const name=document.getElementById('as_name').value.trim();
  const email=document.getElementById('as_email').value.trim();
  const due=document.getElementById('as_due').value;
  if(!gapSel.size){ alert('ยังไม่ได้เลือกรายการ — ติ๊กช่องหน้า Finding ที่ต้องการมอบหมายก่อน'); return; }
  if(!name){ alert('กรุณากรอกชื่อผู้รับผิดชอบ'); return; }
  const assigned=[];
  gapSel.forEach(id=>{
    const s=(state[id]=state[id]||{});
    const c=(s.car=s.car||{});
    if(!c.no) c.no=nextCarNo();
    c.as=name; c.ae=email; c.due=due; c.cast='A';
    logCar(c,`มอบหมายให้ ${name}${due?` กำหนดเสร็จ ${due}`:''}`);
    assigned.push(id);
  });
  assigned.forEach(mark);
  if(sendMail) openMail(assigned, name, email, due);
  gapSel.clear(); render();
}
function mailBody(ids, name, due){
  const L=[`เรียน ${name||'ผู้รับผิดชอบ'}`,'',
   `ตามผลการตรวจติดตามภายใน (Internal Audit – GAP Analysis, TCAR-ORA) วันที่ ${meta.date||today()}`,
   `ขอมอบหมายให้ดำเนินการแก้ไขข้อบกพร่อง (CAR) จำนวน ${ids.length} รายการ ดังนี้`,''];
  ids.forEach(id=>{
    const it=ALL.find(x=>x.id===id); const c=carOf(id)||{};
    L.push(`• ${c.no||''} [${id}] ${it.d.slice(0,140)}`);
    L.push(`  ประเภท: ${gapType(it)}${(st(id)||{}).rm?` | รายละเอียด: ${(st(id)||{}).rm.slice(0,120)}`:''}`);
    L.push(`  กำหนดเสร็จ: ${c.due||due||'-'}`);
    L.push('');
  });
  L.push('ขอให้วิเคราะห์สาเหตุราก (root cause) กำหนด corrective action และรายงานผลกลับตามแบบฟอร์ม CAR ที่แนบ ภายในกำหนด','');
  L.push(`ผู้ตรวจ: ${meta.auditor||'-'}`,'D-0507 Flight Training Co., Ltd. | D-0507-IAC-001');
  return L.join('\n');
}
function openMail(ids, name, email, due){
  const sub=`[D-0507] CAR Assignment — Internal Audit ${meta.date||today()} (${ids.length} รายการ)`;
  const body=mailBody(ids, name, due);
  const url=`mailto:${encodeURIComponent(email||'')}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
  if(url.length>7500){
    navigator.clipboard&&navigator.clipboard.writeText(`เรื่อง: ${sub}\n\n${body}`);
    alert('รายการเยอะเกินกว่าจะเปิดในอีเมลโดยตรง — คัดลอกข้อความลงคลิปบอร์ดแล้ว วางในอีเมลได้เลย และอย่าลืมแนบไฟล์ CAR Form');
  } else location.href=url;
}
function copyMailSel(){
  const ids=[...gapSel];
  if(!ids.length){ alert('เลือกรายการก่อน'); return; }
  const name=document.getElementById('as_name').value.trim();
  navigator.clipboard.writeText(mailBody(ids,name,document.getElementById('as_due').value))
    .then(()=>alert('คัดลอกข้อความอีเมลแล้ว'));
}
function setCarF(id,f,v){ const s=(state[id]=state[id]||{}); const c=(s.car=s.car||{}); c[f]=v; mark(id); }
function carReport(id){
  const c=carOf(id); if(!c) return;
  const miss=[];
  if(!(c.rc||'').trim()) miss.push('① Root Cause Analysis (Part 3)');
  if(!(c.ca||'').trim()) miss.push('② Corrective Action (Part 4)');
  if(!c.cadone) miss.push('② วันที่แล้วเสร็จ (Part 4)');
  if(miss.length){ alert('ตอบกลับไม่ครบ — ต้องกรอกตามลำดับก่อนส่ง:\n• '+miss.join('\n• ')+'\n\n(③ Preventive Action แนะนำให้กรอกทุกครั้ง)'); return; }
  if(!(c.pa||'').trim() && !confirm('ยังไม่ได้กรอก ③ Preventive Action (Part 5) — ส่งตอบกลับโดยไม่มีมาตรการป้องกันการเกิดซ้ำ?')) return;
  c.cast='R'; c.cadate=today(); logCar(c,'ผู้รับผิดชอบส่งตอบกลับ Part 3–5 — รอตรวจรับ (Part 6)'); mark(id); render();
}
function carVerify(id, ok){

function gapType(it){
  const s=st(it.id)||{};
  if(!it.dual) return s.st==='U' ? 'Doc GAP – ไม่มี/ไม่ครบในคู่มือ' : '';
  const d=s.st==='U', i=s.st2==='U';
  if(d&&i) return 'Doc + Implementation GAP – ไม่มีในคู่มือและไม่ได้ปฏิบัติ';
  if(d) return 'Doc GAP – ไม่มี/ไม่ครบในคู่มือ';
  if(i) return 'Implementation GAP – เขียนไว้แต่ไม่ได้ปฏิบัติ/หลักฐานไม่พอ';
  return '';
}

function importJSON(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      Object.assign(meta, d.meta||{});
      Object.keys(state).forEach(k=>delete state[k]);
      Object.assign(state, d.state||{});
      if(fbReady){ Object.keys(state).forEach(k=>pending.add(k)); pendingMeta=true; }
      dirty=false; render();
      alert('โหลดความคืบหน้าเรียบร้อย ('+Object.keys(d.state||{}).length+' รายการ)');
    }catch(e){ alert('ไฟล์ไม่ถูกต้อง: '+e.message); } };
  r.readAsText(f);
  inp.value='';
}

// ═══════════════════ FIREBASE SERVER SYNC ═══════════════════
let FB={};
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
function syncStatus(txt,color){ const el=document.getElementById('syncst'); if(el){ el.textContent=txt; el.style.color=color||'var(--navy)'; } }
async function initFirebase(){
  if(!FIREBASE_CONFIG) return;
  const f=document.querySelector('footer.app');
  f.insertAdjacentHTML('beforeend','<span id="syncst" style="font-size:11px">…</span><button id="fbout" class="carbtn hide" onclick="firebase.auth().signOut()">ออก</button>');
  syncStatus('⏳ กำลังเชื่อมต่อ…');
  try{
    const V='10.12.2';
    await loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-app-compat.js`);
    await Promise.all([
      loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-auth-compat.js`),
      loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore-compat.js`),
      loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-storage-compat.js`),
    ]);
    firebase.initializeApp(FIREBASE_CONFIG);
    FB.db=firebase.firestore(); FB.st=firebase.storage();
    firebase.auth().onAuthStateChanged(u=>{
      fbUser=u;
      document.getElementById('loginov')?.remove();
      document.getElementById('fbout')?.classList.toggle('hide',!u);
      if(u){ startSync(); }
      else { fbReady=false; syncStatus('○ ยังไม่ได้เข้าสู่ระบบ','#C00000'); showLogin(); }
    });
  }catch(e){ syncStatus('⚠ เชื่อมต่อไม่ได้ — โหมดออฟไลน์','#C00000'); console.error(e); }
}
function showLogin(){
  if(document.getElementById('loginov')) return;
  const ov=document.createElement('div');
  ov.id='loginov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(15,25,45,.94);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML=`<div style="background:#fff;border-radius:14px;max-width:400px;width:100%;padding:24px">
    <h2 style="color:var(--navy);margin:0 0 4px;font-size:18px">D-0507 Internal Audit</h2>
    <p style="color:#667;font-size:13px;margin:0 0 16px">เข้าสู่ระบบเพื่อใช้งานร่วมกับทีม (ข้อมูล sync อัตโนมัติ)</p>
    <button class="abtn" style="width:100%;margin-bottom:14px" onclick="fbGoogle()">🔵 เข้าสู่ระบบด้วย Google</button>
    <div style="border-top:1px solid #e2e8f0;margin:10px 0;text-align:center;color:#99a;font-size:11px;line-height:0"><span style="background:#fff;padding:0 8px">หรือ</span></div>
    <input id="li_em" type="email" placeholder="อีเมล" style="width:100%;min-height:44px;border:1px solid #c8d2e0;border-radius:8px;padding:8px 12px;margin:8px 0;box-sizing:border-box">
    <input id="li_pw" type="password" placeholder="รหัสผ่าน" style="width:100%;min-height:44px;border:1px solid #c8d2e0;border-radius:8px;padding:8px 12px;margin:0 0 12px;box-sizing:border-box">
    <div style="display:flex;gap:8px">
      <button class="abtn sec2" style="flex:1" onclick="fbEmail(false)">เข้าสู่ระบบ</button>
      <button class="fbtn" style="flex:1" onclick="fbEmail(true)">สมัครใหม่</button>
    </div>
    <p id="li_err" style="color:var(--red);font-size:12px;min-height:16px;margin:8px 0 0"></p>
  </div>`;
  document.body.appendChild(ov);
}
function fbErr(e){ const el=document.getElementById('li_err'); if(el) el.textContent=e.message||e; }
function fbGoogle(){ firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(fbErr); }
function fbEmail(create){
  const em=document.getElementById('li_em').value.trim(), pw=document.getElementById('li_pw').value;
  (create?firebase.auth().createUserWithEmailAndPassword(em,pw):firebase.auth().signInWithEmailAndPassword(em,pw)).catch(fbErr);
}
function itemsCol(){ return FB.db.collection('audits').doc(AUDIT_ID).collection('items'); }
function cleanForWrite(s){
  const o=JSON.parse(JSON.stringify(s||{}));
  if(o.ph) o.ph=o.ph.filter(p=>p.u).map(p=>({u:p.u,t:p.t||''}));   // only Storage-uploaded photos sync
  return o;
}
function startSync(){
  fbReady=true;
  syncStatus('☁ '+(fbUser.email||'signed in'),'var(--green)');
  // meta
  FB.db.collection('audits').doc(AUDIT_ID).onSnapshot(d=>{
    if(pendingMeta||!d.exists) return;
    const m=d.data().meta; if(m){ Object.assign(meta,m); if(curTab==='dash') render(); }
  });
  // items realtime
  FB.unsub && FB.unsub();
  FB.unsub=itemsCol().onSnapshot(snap=>{
    let changed=0;
    snap.docChanges().forEach(ch=>{
      const id=ch.doc.id;
      if(pending.has(id)) return;               // local edit wins until flushed
      const {t,u,...rest}=ch.doc.data();
      const loc=state[id];
      // keep local-only dataURL photos
      if(loc&&loc.ph){ const localOnly=loc.ph.filter(p=>p.d&&!p.u); rest.ph=[...(rest.ph||[]),...localOnly]; }
      state[id]=rest; changed++;
      refreshItem(id);
    });
    if(changed){ refreshCounts(); if(['gap','car','dash'].includes(curTab)) render(); }
  },e=>{ syncStatus('⚠ sync error','#C00000'); console.error(e); });
  // flusher
  FB.timer && clearInterval(FB.timer);
  FB.timer=setInterval(flush, 2500);
}
async function flush(){
  if(!fbReady||!fbUser) return;
  if(pendingMeta){
    pendingMeta=false;
    FB.db.collection('audits').doc(AUDIT_ID).set({meta:{auditor:meta.auditor,date:meta.date,scope:meta.scope},
      t:firebase.firestore.FieldValue.serverTimestamp(), u:fbUser.email||''},{merge:true}).catch(console.error);
  }
  if(!pending.size) return;
  const ids=[...pending]; pending.clear();
  const batch=FB.db.batch();
  ids.forEach(id=>{
    batch.set(itemsCol().doc(id), {...cleanForWrite(state[id]),
      t:firebase.firestore.FieldValue.serverTimestamp(), u:fbUser.email||''}, {merge:false});
  });
  try{ await batch.commit(); syncStatus('☁ บันทึกแล้ว '+new Date().toTimeString().slice(0,5)+' · '+(fbUser.email||''),'var(--green)'); }
  catch(e){ ids.forEach(id=>pending.add(id)); syncStatus('⚠ บันทึกไม่สำเร็จ — จะลองใหม่','#C00000'); console.error(e); }
}
async function uploadPhoto(id, idx){
  try{
    const s=state[id]; const p=s.ph[idx]; if(!p||!p.d) return;
    const ref=FB.st.ref().child(`audits/${AUDIT_ID}/photos/${id}/${Date.now()}_${idx}.jpg`);
    await ref.putString(p.d,'data_url');
    p.u=await ref.getDownloadURL(); delete p.d;
    mark(id); refreshItem(id);
  }catch(e){ console.error('photo upload failed',e); }
}
initFirebase();
