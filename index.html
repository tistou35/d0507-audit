<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>D-0507 Internal Audit Checklist – GAP Analysis (TCAR-ORA)</title>
<style>
:root{
  --navy:#1F3864; --blue:#2E75B6; --lblue:#D6E4F7; --grey:#F0F4F8;
  --green:#1A6B1A; --greenbg:#D5EFCC; --red:#C00000; --redbg:#FFD9D9;
  --amber:#9C6500; --amberbg:#FFF2CC; --ink:#1a1a2a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; font-family:Arial,"Helvetica Neue",sans-serif; background:var(--grey); color:var(--ink); font-size:15px;}
header.app{background:var(--navy); color:#fff; padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 0 16px; position:sticky; top:0; z-index:50;}
header.app h1{margin:0; font-size:17px; letter-spacing:.2px;}
header.app .sub{font-size:12px; opacity:.85; margin:3px 0 8px;}
.tabs{display:flex; gap:4px; overflow-x:auto; padding-bottom:0;}
.tab{flex:0 0 auto; padding:10px 14px; border-radius:8px 8px 0 0; background:rgba(255,255,255,.13); color:#fff; font-weight:bold; font-size:13px; border:none; cursor:pointer; min-height:42px;}
.tab.active{background:var(--grey); color:var(--navy);}
.tab .cnt{font-weight:normal; font-size:11px; opacity:.8;}
main{padding:12px; max-width:1080px; margin:0 auto; padding-bottom:80px;}
.card{background:#fff; border:1px solid #d8dfe8; border-radius:10px; margin-bottom:12px; overflow:hidden;}
.card > .hd{background:var(--blue); color:#fff; padding:12px 14px; font-weight:bold; font-size:15px; display:flex; justify-content:space-between; align-items:center; gap:8px; cursor:pointer; min-height:48px;}
.card > .hd .th{display:block; font-weight:normal; font-size:12px; opacity:.9;}
.card > .hd .prog{font-size:12px; font-weight:normal; text-align:right; white-space:nowrap;}
.bar{height:6px; background:#e2e9f2;}
.bar i{display:block; height:100%; background:var(--green); transition:width .3s;}
.bar i.gap{background:var(--red);}
.body{display:none; padding:6px 10px 12px;}
.card.open .body{display:block;}
.sec{margin:10px 0 4px; background:var(--lblue); color:var(--navy); font-weight:bold; padding:9px 12px; border-radius:7px; font-size:14px; display:flex; justify-content:space-between; align-items:center; gap:8px;}
.sec .mini{font-size:11px; font-weight:normal;}
.grp{border:1px solid #e2e8f0; border-radius:8px; margin:8px 0; overflow:hidden;}
.grp .ghd{background:#f6f9fd; padding:8px 12px; font-size:13px; color:var(--navy); display:flex; gap:8px; align-items:baseline; justify-content:space-between; flex-wrap:wrap;}
.grp .ghd b{font-size:13px;}
.gno{background:var(--navy); color:#fff; border-radius:5px; padding:1px 7px; font-size:12px; flex:0 0 auto;}
.bulk{border:1px solid var(--blue); background:#fff; color:var(--blue); border-radius:6px; font-size:11px; padding:4px 8px; cursor:pointer;}
.item{padding:10px 12px; border-top:1px solid #eef2f7; display:block;}
.item.hdRow{background:#fbfcff;}
.item .d{margin:0 0 6px; line-height:1.45;}
.item.hdRow .d{font-weight:bold; color:var(--navy);}
.meta{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:6px;}
.chip{font-size:11px; border-radius:5px; padding:2px 7px; background:var(--grey); color:#4a5a70; border:1px solid #dde4ee;}
.chip.rr{background:#eef4fb; color:var(--blue); border-color:#c9dcf2;}
.chip.prevY{background:var(--greenbg); color:var(--green); border:none;}
.chip.prevN{background:var(--redbg); color:var(--red); border:none;}
.chip.prevNA{background:#eee; color:#666; border:none;}
.ctr{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.stbtn{min-width:52px; min-height:40px; border-radius:8px; border:1.5px solid #c8d2e0; background:#fff; font-weight:bold; font-size:14px; cursor:pointer; color:#5a6a80;}
.stbtn.S.on{background:var(--green); border-color:var(--green); color:#fff;}
.stbtn.U.on{background:var(--red); border-color:var(--red); color:#fff;}
.stbtn.NA.on{background:#667; border-color:#667; color:#fff;}
.refin{flex:1 1 200px; min-height:38px; border:1px solid #c8d2e0; border-radius:7px; padding:6px 9px; font-size:13px; font-family:inherit; color:var(--navy); background:#fff;}
.rmk{width:100%; margin-top:7px; border:1.5px solid var(--redbg); background:#fff8f8; border-radius:7px; padding:7px 9px; font-size:13px; font-family:inherit; min-height:44px; display:none;}
.item.stU .rmk{display:block; border-color:var(--red);}
.thd{margin:0 0 6px; color:#556; font-size:13px; line-height:1.45;}
details.mref{margin:0 0 8px; border:1px solid #c9dcf2; border-radius:7px; background:#f4f8fd; font-size:12.5px;}
details.mref summary{padding:7px 10px; color:var(--blue); font-weight:bold; cursor:pointer; min-height:36px; display:flex; align-items:center; gap:6px; list-style:none;}
details.mref summary::-webkit-details-marker{display:none;}
details.mref[open] summary{border-bottom:1px dashed #c9dcf2;}
details.mref .mx{padding:8px 11px; color:#334; line-height:1.55; white-space:pre-line;}
details.mref .mx b{color:var(--navy);}
details.how2{background:#fffdf4; border-color:#e8d9a8;}
details.how2 summary{color:var(--amber);}
.assignbar{background:#fff; border:2px solid var(--blue); border-radius:10px; padding:12px; margin-bottom:14px;}
.assignbar h4{margin:0 0 8px; color:var(--navy); font-size:14px;}
.assignbar .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.assignbar input{min-height:42px; border:1px solid #c8d2e0; border-radius:8px; padding:8px 10px; font-size:14px; font-family:inherit;}
.gsel{width:24px; height:24px; accent-color:var(--red); flex:0 0 auto; margin-top:2px;}
.gaphead{display:flex; gap:10px; align-items:flex-start;}
.carbox{background:#f7f9fc; border:1px solid #c9d6e8; border-radius:8px; padding:9px 11px; margin-top:8px; font-size:12.5px;}
.carbox .cno{font-weight:bold; color:var(--navy);}
.carpill{display:inline-block; border-radius:10px; padding:2px 10px; font-size:11px; font-weight:bold; margin-left:6px;}
.carpill.A{background:var(--amberbg); color:var(--amber);}
.carpill.R{background:#dbe9ff; color:#1d5eb8;}
.carpill.V{background:var(--greenbg); color:var(--green);}
.carpill.X{background:var(--redbg); color:var(--red);}
.overdue{color:var(--red); font-weight:bold;}
.carbox .hist{color:#7a8798; font-size:11px; margin-top:5px; white-space:pre-line;}
.castep{display:flex; gap:9px; margin-top:9px;}
.castep .sn{flex:0 0 24px; height:24px; border-radius:50%; background:var(--blue); color:#fff; font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center;}
.castep.done .sn{background:var(--green);}
.castep.wait .sn{background:#aab6c6;}
.castep .sb{flex:1; min-width:0;}
.ca-lb{font-weight:bold; color:var(--navy); font-size:12px; margin-top:7px;}
.ca-sm{min-height:34px; border:1px solid #c8d2e0; border-radius:6px; padding:3px 8px;}
.carbtn{min-height:38px; border-radius:7px; border:1px solid var(--blue); background:#fff; color:var(--blue); font-size:12px; font-weight:bold; padding:5px 10px; cursor:pointer; margin:3px 4px 0 0;}
.carbtn.v{border-color:var(--green); color:var(--green);}
.carbtn.x{border-color:var(--red); color:var(--red);}
.ca-in{width:100%; margin-top:6px; border:1px solid #c8d2e0; border-radius:7px; padding:7px 9px; font-size:13px; font-family:inherit; min-height:40px;}
table.cartab{width:100%; border-collapse:collapse; font-size:12.5px; background:#fff;}
table.cartab th{background:var(--navy); color:#fff; padding:7px; text-align:left; font-size:12px;}
table.cartab td{border:1px solid #dde4ee; padding:6px 8px; vertical-align:top;}
.chklist{border:1px dashed #b9c9de; border-radius:8px; padding:8px 10px 4px; margin-bottom:8px; background:#fcfdff;}
.chklist .cht{font-size:11.5px; font-weight:bold; color:var(--navy); margin-bottom:4px;}
.chk{display:flex; align-items:flex-start; gap:8px; padding:5px 0; font-size:13px; color:#334; cursor:pointer;}
.chk input{width:20px; height:20px; margin:0; flex:0 0 auto; accent-color:var(--green);}
.chk.ck{color:var(--green);}
.photorow{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:7px;}
.pbtn{min-height:40px; border-radius:8px; border:1.5px solid var(--blue); background:#fff; color:var(--blue); font-weight:bold; font-size:13px; padding:6px 12px; cursor:pointer;}
.thumb{position:relative; width:64px; height:64px; border-radius:8px; overflow:hidden; border:1px solid #c8d2e0;}
.thumb img{width:100%; height:100%; object-fit:cover; display:block; cursor:pointer;}
.thumb .del{position:absolute; top:0; right:0; background:rgba(192,0,0,.85); color:#fff; border:none; width:20px; height:20px; font-size:12px; line-height:1; cursor:pointer; border-radius:0 0 0 7px;}
#pview{position:fixed; inset:0; background:rgba(10,16,30,.92); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:16px;}
#pview img{max-width:96%; max-height:82vh; border-radius:8px;}
#pview button{min-height:44px; border-radius:9px; border:none; background:#fff; color:var(--navy); font-weight:bold; padding:8px 20px; font-size:14px;}
.how{background:#f6f9fd; border-left:3px solid var(--blue); border-radius:0 7px 7px 0; padding:7px 10px; font-size:12.5px; color:#3a4a60; line-height:1.5; margin-bottom:8px;}
.chip.mt{background:var(--amberbg); color:var(--amber); border:none;}
.dualrow{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:6px;}
.dlab{flex:0 0 92px; font-size:11.5px; font-weight:bold; color:var(--navy); line-height:1.25;}
.dhint{font-size:11px; color:#8a97a8;}
.toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center;}
.toolbar input[type=search]{flex:1 1 220px; min-height:44px; border:1px solid #c8d2e0; border-radius:9px; padding:8px 12px; font-size:15px; font-family:inherit;}
.fbtn{min-height:40px; border-radius:8px; border:1.5px solid var(--blue); background:#fff; color:var(--blue); font-weight:bold; padding:6px 12px; font-size:13px; cursor:pointer;}
.fbtn.on{background:var(--blue); color:#fff;}
.abtn{min-height:44px; border-radius:9px; border:none; background:var(--navy); color:#fff; font-weight:bold; padding:8px 16px; font-size:14px; cursor:pointer;}
.abtn.sec2{background:var(--blue);}
.abtn.warn{background:var(--red);}
.dash{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin-bottom:14px;}
.dcard{background:#fff; border:1px solid #d8dfe8; border-radius:10px; padding:14px;}
.dcard h3{margin:0 0 2px; font-size:15px; color:var(--navy);}
.dcard .th{font-size:12px; color:#667; margin-bottom:8px;}
.dnum{font-size:26px; font-weight:bold; color:var(--navy);}
.dnum small{font-size:13px; color:#667; font-weight:normal;}
.drow{display:flex; gap:10px; margin-top:6px; font-size:12px;}
.drow b.g{color:var(--green);} .drow b.u{color:var(--red);} .drow b.n{color:#666;} .drow b.p{color:var(--amber);}
table.cl{width:100%; border-collapse:collapse; font-size:13px; background:#fff;}
table.cl th{background:var(--navy); color:#fff; padding:8px; text-align:left; font-size:12px;}
table.cl td{border:1px solid #dde4ee; padding:7px 8px; vertical-align:top;}
table.cl tr.subhd td{background:var(--lblue); color:var(--navy); font-weight:bold;}
.pill{display:inline-block; border-radius:10px; padding:1px 9px; font-size:11px; font-weight:bold;}
.pill.ok{background:var(--greenbg); color:var(--green);}
.pill.gap{background:var(--redbg); color:var(--red);}
.pill.pend{background:var(--amberbg); color:var(--amber);}
.pill.none{background:#eee; color:#888;}
.audmeta{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:8px; margin-bottom:12px;}
.audmeta label{font-size:11px; color:var(--navy); font-weight:bold; display:block; margin-bottom:2px;}
.audmeta input{width:100%; min-height:42px; border:1px solid #c8d2e0; border-radius:8px; padding:8px 10px; font-size:14px; font-family:inherit;}
.note{background:#fff; border-left:4px solid var(--blue); padding:10px 12px; font-size:12.5px; color:#445; border-radius:0 8px 8px 0; margin-bottom:12px; line-height:1.5;}
.gapitem{background:#fff; border:1px solid var(--redbg); border-left:4px solid var(--red); border-radius:8px; padding:10px 12px; margin-bottom:8px; font-size:13.5px;}
.gapitem .w{color:#667; font-size:12px; margin-top:3px;}
footer.app{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:2px solid var(--navy); padding:8px 14px calc(env(safe-area-inset-bottom,0px) + 8px); display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--navy); z-index:40; gap:8px;}
footer .fbar{flex:1; margin:0 8px;}
.hide{display:none!important;}
@media print{
 header.app,footer.app,.toolbar,.abtn,.fbtn,.bulk,.stbtn{display:none!important;}
 body{background:#fff;} .body{display:block!important;} main{padding-bottom:0;}
}
</style>
</head>

azards are identified through the application of a hazard identification process. T"}], "chk": ["4.6.1 Definition of Hazard and Risk", "4.6.2 Hazard Identification Process", "4.6.3 Hazard Reporting Form", "4.6.4 Hazard identification Sources", "4.6.5 Hazard Consequences Identification Sources", "4.6.6 Hazard Identification Process"]}]}, {"n": "44", "subj": "Risk assessment process.", "items": [{"id": "OMM-0136", "d": "Define or give the reference of the process in place within the organisation to analyse and assess the identified risks.", "rr": "ORA.GEN.200(a)(3)", "rk": "ORA.GEN.200", "ref": "P. 4-33 ถึง 4-40 / 4.8. RISK ASSESSMENT และ 4.8.2. Risk Assessment Process", "prev": "Y", "hd": 0, "how": "เปิด OMM-2026 V3 ตาม Reference แล้วตรวจ: 1) เนื้อหาครอบคลุมประเด็นข้อนี้ครบถ้วน 2) ระบุผู้รับผิดชอบ/ขั้นตอน/แบบฟอร์มชัดเจน นำไปปฏิบัติได้จริง 3) สอดคล้องกับ ORA.GEN.200(a)(3) 4) เลขหน้า/ชื่อหัวข้อใน Reference ยังตรงกับคู่มือฉบับปัจจุบัน — ถ้ามีรายการย่อยด้านล่าง ให้ติ๊กยืนยันทีละหัวข้อว่ามีในคู่มือจริง", "mx": [{"t": "4.8 Risk Assessment", "x": "SM only addresses the assessment of aviation safety risks. This does not mean that financial, legal, or economic aspects do not need to be considered in the risk assessment process. D-0507 should identify all significant influences that may impact aviation safety, particularly when determining contributing factors for analysing the consequences of a hazard and deciding on risk mitigation measures.\n▸ 4.8.1 Risk Assessment, Description and Evaluation: Risk combines two dimensions: the likelihood of hazard consequences and their severity. Both dimensions have to be assessed\n▸ 4.8.2 Risk Assessment Process: The risk assessment process is a critical component of the organisation's safety management system (SMS). This process is designed to systematically analyse and assess any risks identified during oper\n▸ 4.8.3 Probability Table: Assessment of likelihood is based on the following two way process: hazard consequences are analyzed to establish possible causes, contributing factors and existing barriers causes, contributing facto\n▸ 4.8.4 Analysis of Likelihood: Assessment of likelihood is based on the following two way process: hazard consequences are analyzed to establish possible causes, contributing factors and existing barriers causes, contributing facto\n▸ 4.8.5 Analysis of Severity: The severity of all hazard consequences is analysed. The analysis considers both short-term and long-term consequences, such as effects on the natural and works environment. Consequences are groupe"}], "chk": ["4.8.1 Risk Assessment, Description and Evaluation", "4.8.2 Risk Assessment Process", "4.8.3 Probability Table", "4.8.4 Analysis of Likelihood", "4.8.5 Analysis of Severity", "4.8.6 Severity Classification Table"]}]}, {"n": "45", "subj": "Risk mitigation process.", "items": [{"id": "OMM-0137", "d": "Define or give the reference of the process in place within the organisation to mitigate the identified risks.", "rr": "ORA.GEN.200(a)(3)", "rk": "ORA.GEN.200", "ref": "P. 4-41 ถึง 4-45 / 4.9. RISK MITIGATION STRATEGIES AND MITIGATION MEASURES และ 4.9.1. Risk Mitigation Process", "prev": "Y", "hd": 0, "how": "เปิด OMM-2026 V3 ตาม Reference แล้วตรวจ: 1) เนื้อหาครอบคลุมประเด็นข้อนี้ครบถ้วน 2) ระบุผู้รับผิดชอบ/ขั้นตอน/แบบฟอร์มชัดเจน นำไปปฏิบัติได้จริง 3) สอดคล้องกับ ORA.GEN.200(a)(3) 4) เลขหน้า/ชื่อหัวข้อใน Reference ยังตรงกับคู่มือฉบับปัจจุบัน — ถ้ามีรายการย่อยด้านล่าง ให้ติ๊กยืนยันทีละหัวข้อว่ามีในคู่มือจริง", "mx": [{"t": "4.9 Risk mitigation strategies and Mitigation measures", "x": "The risk evaluation forms the basis for deciding on risk control (mitigating) measures and assessing these measures' effectiveness. Risk control measures identify the consequences associated with both an unacceptable risk and tolerable risk and where further risk reduction measures are feasible and reasonable. Identification of possible mitigation is based on the risk description and evaluation, considering in particular any un ure that everyone involved in the ATO is aware of the safety management activities;\nInform about the outcome of any assessed risks and analysed hazard;\nExplain the mitigation measures undertaken;\nThat relevant persons receives a feedback from a voluntary report.", "rr": "ORA.GEN.200(a)(4)", "rk": "ORA.GEN.200", "ref": "P. 4-71 ถึง 4-73 / 4.14. SAFETY COMMUNICATION และ P. 4-72 / 4.14.5. FEEDBACK OF SAFETY INFORMATION", "prev": "Y", "hd": 0, "how": "เปิด OMM-2026 V3 ตาม Reference แล้วตรวจ: 1) เนื้อหาครอบคลุมประเด็นข้อนี้ครบถ้วน 2) ระบุผู้รับผิดชอบ/ขั้นตอน/แบบฟอร์มชัดเจน นำไปปฏิบัติได้จริง 3) สอดคล้องกับ ORA.GEN.200(a)(4) 4) เลขหน้า/ชื่อหัวข้อใน Reference ยังตรงกับคู่มือฉบับปัจจุบัน — ถ้ามีรายการย่อยด้านล่าง ให้ติ๊กยืนยันทีละหัวข้อว่ามีในคู่มือจริง", "mx": [{"t": "4.14 Safety Communication", "x": "▸ 4.14.1 Safety Communication Policy: Safety communication is an element of the Safety Promotion component of the SMS framework. The company recognizes the importance of providing personnel with the necessary information to discharge thei\n▸ 4.14.2 Communication Mean: Different communication means are used: Safety meetings, Safety briefings, E-mail, postal mail Safety information from the OEMs, the authorities, Helicopter Associations and from national and internat\n▸ 4.14.3 Communication Content: The general content to the dissemination General content of Safety Management Systems Company Policy and Objectives Risk Management Safety Assurance Safety Promotion The regulatory authority’s role in\n▸ 4.14.4 ROLES AND RESPONSIBILITIES: Safety Manager is responsible for: The establishment and ongoing maintenance of programs for the provision of safety information to all employees. Approving any communication related to D0507’s safety\n▸ 4.14.5 FEEDBACK OF SAFETY INFORMATION: D0507 provide feedback on safety material to all levels within the company regularly as a valuable safety tool. The SM provides a number of feedback levels, and operational areas can provide their own\n▸ 4.14.6 Official Mode and Channel of Communication: D0507 communication via: Line application (main: notification) Direct E-mail ulletin (Hard copy) All published contents are stored in D0507skylibrary cloud sharing.\n▸ 4.14.7 Determine the effective of Communication: D0507 determine the effectiveness of safety commu"}, {"t": "4.14.5 FEEDBACK OF SAFETY INFORMATION", "x": "D0507 provide feedback on safety material to all levels within the company regularly as a valuable safety tool. The SM provides a number of feedback levels, and operational areas can provide their own internal feedback and safety communications to staff. To ensure that all personnel receive safety communication in both an engaging and timely manner, various media and strategies will be used. The focus of safety promotion will be on existing hazards identified and provide the reasoning behind the"}], "chk": ["4.14.1 Safety Communication Policy", "4.14.2 Communication Mean", "4.14.3 Communication Content", "4.14.4 ROLES AND RESPONSIBILITIES", "4.14.5 FEEDBACK OF SAFETY INFORMATION", "4.14.6 Official Mode and Channel of Communication", "4.14.7 Determine the effective of Communication"]}]}, {"n": "54", "subj": "Immediate reaction to a safety problem.", "items": [{"id": "OMM-0150", "d": "Describe how the organisation will remain vigilant towards any safety problems raised either by the industry or the CAAT and who is responsible for this task.", "rr": "ORA.GEN.155", "rk": "ORA.GEN.155", "ref": "P. 4-75 ถึง 4-76 / 4.15. IMMEDIATE REACTION TO A SAFETY PROBLEM", "prev": "Y", "hd": 0, "how": "เปิด OMM-2026 V3 ตาม Reference แล้วตรวจ: 1) เนื้อหาครอบคลุมประเด็นข้อนี้ครบถ้วน 2) ระบุผู้รับผิดชอบ/ขั้นตอน/แบบฟอร์มชัดเจน นำไปปฏิบัติได้จริง 3) สอดคล้องกับ ORA.GEN.155 4) เลขหน้า/ชื่อหัวข้อใน Reference ยังตรงกับคู่มือฉบับปัจจุบัน — ถ้ามีรายการย่อยด้านล่าง ให้ติ๊กยืนยันทีละหัวข้อว่ามีในคู่มือจริง", "mx": [{"t": "4.15 Immediate Reaction to a Safety Problem", "x": "The organisation maintains a proactive and vigilant approac ent system. This process ensures that all reported occurrences are thoroughly investigate\n▸ 6.2.3 Reporting Form: Refer to Attachment ATT6A «Reporting-Analysis Form». The company utilises an online form to report any safety concerns or occurrences. https://form.jotform.com/211762270325045"}], "chk": ["6.2.1 Reportable occurrences", "6.2.2 Follow-up process for handling occurrence reports", "6.2.3 Reporting Form"]}, {"id": "OMM-0152", "d": "Describe how the organisation will report to the competent authority and to the organisation responsible for the design of the aircraft any incident, malfunction, technical defect, exceeding of technical limitations, occurrence that would highlight inaccurate, incomplete or ambiguous information contained in data established in accordance with Part-21 or other irregular circumstance that has or may have endangered the safe operation of the aircraft and that has not resulted in an accident or serious incident.", "rr": "ORA.GEN.160", "rk": "ORA.GEN.160", "ref": "P. 6-2 / 6.2.2. Follow-up process for handling occurrence reports", "prev": "Y", "hd": 0, "how": "เปิด OMM-2026 V3 ตาม Reference แล้วตรวจ: 1) เนื้อหาครอบคลุมประเด็นข้อนี้ครบถ้วน 2) ระบุผู้รับผิดชอบ/ขั้นตอน/แบบฟอร์มชัดเจน นำไปปฏิบัติได้จริง 3) สอดคล้องกับ ORA.GEN.160 4) เลขหน้า/ชื่อหัวข้อใน Reference ยังตรงกับคู่มือฉบับปัจจุบัน — ถ้ามีรายการย่อยด้านล่าง ให้ติ๊กยืนยันทีละหัวข้อว่ามีในคู่มือจริง", "mx": [{"t": "6.2.2 Follow-up process for handling occurrence reports", "x": "The follow-up process for handling occurrence reports is a critical component of our safety and quality management system. This process ensures that all reported occurrences are thoroughly investigated, appropriate corrective and preventive actions are implemented, and the effectiveness of these actions is monitored. The primary objective is to enhance safety, improve operational efficiency, and prevent recurrence of similar incidents. Note: To comply with personal data protection regulations an"}]}, {"id": r phases of training. This training prepares instructors to teach advanced subjects, handle more complex flight operations, and meet the regulatory requirements needed to lift restrictions on their instructional certificates."}]}]}, {"n": "45", "subj": "ATO personnel standards evaluation.", "items": [{"id": "OMA-0099", "d": "Define the procedure to evaluate ATO personnel standards.", "rr": "", "rk": "ORA.ATO.230", "ref": "P. D-37 / D.3. PERSONNEL STANDARDS EVALUATION", "prev": "Y", "hd": 0, "how": "เปิด OMA 2026 V3 ตาม Reference แล้วตรวจ: 1) เนื้อหาครอบคลุมประเด็นข้อนี้ครบถ้วน 2) ระบุผู้รับผิดชอบ/ขั้นตอน/แบบฟอร์มชัดเจน นำไปปฏิบัติได้จริง 3) สอดคล้องกับข้อกำหนดที่เกี่ยวข้อง 4) เลขหน้า/ชื่อหัวข้อใน Reference ยังตรงกับคู่มือฉบับปัจจุบัน — ถ้ามีรายการย่อยด้านล่าง ให้ติ๊กยืนยันทีละหัวข้อว่ามีในคู่มือจริง", "mx": [{"t": "D.3 personnel standards evaluation", "x": "The success and effectiveness of D0507's training programs are driven by the dedication and expertise of its key personnel. These individuals are not only responsible for delivering high-quality instruction but also for periodically training and reviewing content to ensure it remains current and relevant. By staying updated with the latest advancements and best practices, they play a crucial role in maintaining the standards of excellence that D0507 is known for. Their continuous efforts in cont\n▸ D.3.1 Accountable Manager (ACM): The competence of the Accountable Manager is supported and evaluated by the Board of Directors based on key elements related to the organization’s overall performance. This includes safety standards, \n▸ D.3.2 Head of Training (HT): The competence of the Head of Training is supported and evaluated by the Accountable Manager:\n▸ D.3.3 Instructors for flight instructions all categories: The competence of the instructors for flight instructions are supported, standardised and evaluated by the Chief Flight Instructor:\n▸ D.3.4 Theoretical Knowledge Instructors (TKI): The competence of Theoretical Knowledge Instructors is supported, standardised and evaluated by the Chief Theoretical Knowledge Instructor:\n▸ D.3.5 Other Personnel: The competence of other ATO personnel (e.g. secretary, accounting etc.) is standardised based on: evaluated by means of yearly employee qualification by the Accountable Manager."}], "chk": ["D.3.1 Accountable Manager (ACM)", "D.3.2 Head of Training (HT)", "D.3.3 Instructors for flight instructions all categories", "D.3.4 Theoretical Knowledge Instructors (TKI)", "D.3.5 Other Personnel"]}]}]}]}]}, {"c": "TM", "t": "TM / PPL(A) Course – Training Programme", "th": "คู่มือการฝึกและหลักสูตร PPL(A)", "doc": "อ้างอิง PEL-TO-CK-070 rev.02", "man": "TM-2026 + PPL Course Manual 2026 V3", "parts": [{"t": "Course General Requirements", "th": "ข้อกำหนดทั่วไปของหลักสูตร", "secs": [{"t": "General Requirement", "groups": [{"n": "1", "subj": "Pre-entry requirement", "items": [{"id": "TM-0001", "d": "Applicants for the SPL shall be at least 17 years of age", "rr": "TCAR PEL PART FCL FCL.080", "rk": "FCL.080", "ref": "P. A1-4/ 2.1.1. Pre-requisite", "prev": "Y", "hd": 0}, {"id": "TM-0002", "d": "The ATO shall ensure that the students meet all the pre-requisites for training established in applicable Medical regulations, in TCAR PEL Part FCL, and, if applicable, as defined in mandatory parts of operational suitability data established in accordance with EASA Part 21 or equivalent material established in accordance with Type certification regulations acceptable to the CAAT.", "rr": "ORA.ATO.145", "rk": "ORA.ATO.145", "ref": "P. A1-4/ 2.1. Applicant Information P. A1-4/ 2.1.1. Pre-requisiteTM Chapter 1/ 1.1.15 Pre-entry requirements", "prev": "Y", "hd": 0}], "how": "ตรวจกับ TM-2026 / PPL Course Manual ตาม Reference ของกลุ่มนี้: 1) ทุกหัวข้อย่อยด้านล่างต้องปรากฏใน syllabus / lesson plan 2) เลขหน้า-บทเรียนใน Reference ตรงกับคู่มือฉบับปัจจุบัน 3) สุ่มบันทึกการฝึกจริงของศิษย์ (student records) ว่าหัวข้อถูกสอน/ฝึกและมีการประเมิน 4) ข้อที่ไม่มี Referenc ompletion of a skill test, applicants for a BPL, GPL or PPL shall demonstrate the ability to perform as PIC on the appropriate aircraft category the relevant procedures and maneuvers with the competency appropriate to the privileges granted", "rr": "TCAR PEL PART FCL FCL.235", "rk": "FCL.235", "ref": "P. A1-41/ 6. Skill test TM Chapter 1/ 1.4.1 Flying", "prev": "Y", "hd": 0}, {"id": "TM-0025", "d": "An applicant for the skill test shall have received flight instruction on the same class or type of aircraft, or in one or more balloons within a group of balloons to be used for the skill test.", "rr": "TCAR PEL PART FCL FCL.235", "rk": "FCL.235", "ref": "P. A1-42/ 6.1. Skill Test Requirements", "prev": "Y", "hd": 0}, {"id": "TM-0026", "d": "Pass marks", "rr": "TCAR PEL PART FCL FCL.235", "rk": "FCL.235", "ref": "", "prev": "", "hd": 0}, {"id": "TM-0027", "d": "The skill test shall be divided into different sections, representing all the different phases of flight appropriate to the category of aircraft flown.", "rr": "TCAR PEL PART FCL FCL.235", "rk": "FCL.235", "ref": "P. A1-43/ 6.2. Pass Marks P. A1-42/ 6.3. Skill Test Structure and Requirements for the Issue of a PPL(A)", "prev": "Y", "hd": 0}, {"id": "TM-0028", "d": "Failure in any item of a section will cause the applicant to fail the entire section. If the applicant fails only 1 section, he/she they shall repeat only that section. Failure in more than 1 section will cause the applicant to fail the entire test.", "rr": "TCAR PEL PART FCL FCL.235", "rk": "FCL.235", "ref": "P. A1-43/ 6.2. Pass Marks", "prev": "Y", "hd": 0}, {"id": "TM-0029", "d": "When the test needs to be repeated in accordance with (2), failure in any section, including those that have been passed on a previous attempt, will cause the applicants to fail the entire test.", "rr": "TCAR PEL PART FCL FCL.235", "rk": "FCL.235", "ref": "P. A1-43/ 6.2. Pass Marks", "prev": "Y", "hd": 0}, {"id": "TM-0030", "d": "Failure to achieve a pass in all sections o e syllabi and adequate for the type of aircraft used for training, the"}], "chk": ["จุด briefing เพียงพอกับจำนวนศิษย์", "Whiteboard / แผนภูมิ / โมเดลเครื่องบิน", "Syllabus / lesson plan มีให้ใช้ ณ จุด briefing"]}, {"id": "SITE-0004", "d": "Classrooms match the declared capacity, with training aids (projector, models, instruments) serviceable; environment (lighting, ventilation, noise) suitable for instruction.", "th": "ห้องเรียนรองรับจำนวนตามที่แจ้งไว้ อุปกรณ์ช่วยสอนใช้งานได้ สภาพแวดล้อม (แสง เสียง อากาศ) เหมาะสมกับการเรียนการสอน", "rr": "ORA.GEN.215", "rk": "ORA.GEN.215", "ref": "OMM 1.10", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS"], "how": "Inspect each classroom. Operate projector/training aids. Compare room list vs OMM facilities section. ถ่ายรูปประกอบหลักฐาน", "mx": [{"t": "OMM 1.10 Location, Facilities and Infrastructure", "x": "The following facilities and infrastructure are available at D0507: For the plan of the premises and detailed descriptions of the operations room, flight planning room, briefing rooms, and theoretical instruction facilities, please refer to OM Part C Chapter D.10 'Mainbase Location and Facilities'.\n▸ 1.10.1 LOCATION AND MAIN BASE LAYOUT: Refer< D0507-OMM-ANX-1.9, KABINBURI OPERATING SITE > Mechanic and BattMechanic and BattFuel StorageFuel StoragePart storagePart storageDocument storageDocument storageMechanic roomMechanic roomAirside\n▸ 1.10.2 TRAINING AREAS AND AERODROMES USED FOR TRAINING: Refer to <OMC C.9.1Training areas and aerodromes used for training > In conformity with the training specification detailed in the syllabi and adequate for the type of aircraft used for training, the"}], "chk": ["ความจุห้องพอกับจำนวนผู้เรียนจริง", "โปรเจคเตอร์/สื่อการสอนใช้งานได้", "แสงสว่าง เสียง การระบายอากาศเหมาะสม"]}, {"id": "SITE-0005", "d": "Reference library / study area with current regulations (TCAR, AIP), manuals and training publications accessible to instructors and students.", "th": "มีมุมเอกสารอ้างอิง/ห้องสมุดที่มีกฎระเบียบและคู่มือฉบับปัจจุบันให้ครูการบินและศิษย์การบินเข้าถึงได้", "rr": "ORA.GEN.215", "rk": "ORA.GEN.215", "ref": "OMM 0 / LEP", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "DOC"], "how": "Spot-check 3 documents for currency (TCAR PEL, OMA, TM revision status vs LEP). Ask a student where to find the training manual.", "chk": ["TCAR/กฎระเบียบฉบับปัจจุบัน", "OMM/OMA/TM revision ตรง LEP", "ศิษย์การบินเข้าถึงเอกสารได้จริง"]}]}, {"n": "S1.3", "subj": "Access control & security / การควบคุมการเข้าถึง", "items": [{"id": "SITE-0006", "d": "Access to ATO premises, operational areas and records is controlled as described in the OMM; visitors are managed; critical areas protected.", "th": "การเข้าถึงพื้นที่ปฏิบัติการและเอกสารถูกควบคุมตามที่เขียนไว้ใน OMM มีการจัดการผู้มาเยือน พื้นที่สำคัญได้รับการป้องกัน", "rr": "ORA.GEN.140", "rk": "ORA.GEN.140", "ref": "OMM 1.10", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "DEMO", "INT"], "how": "Observe entry points, visitor log in use, keys/locks on records room. Ask staff how unauthorised persons are prevented from flight line access. Compare practice vs OMM 1.10 Access.", "mx": [{"t": "OMM 1.10 Location, Facilities and Infrastructure", "x": "The following facilities and infrastructure are available at D0507: For the plan of the premises and detailed descriptions of the operations room, flight planning room, briefing rooms, and theoretical instruction facilities, please refer to OM Part C Chapter D.10 'Mainbase Location and Facilities'.\n▸ 1.10.1 LOCATION AND MAIN BASE LAYOUT: Refer< D0507-OMM-ANX-1.9, KABINBURI OPERATING SITE > Mechanic and BattMechanic and BattFuel StorageFuel StoragePart storagePart storageDocument storageDocument storageMechanic roomMechanic roomAirside\n▸ 1.10.2 TRAINING AREAS AND AERODROMES USED FOR TRAINING: Refer to <OMC C.9.1Training areas and aerodromes used for training > In conformity with the training specification detailed in the syllabi and adequate for the type of aircraft used for training, the"}], "chk": ["จุดทางเข้าควบคุมการผ่าน", "Visitor log ใช้งานจริง", "ห้องเอกสาร/บันทึกล็อกกุญแจ", "มาตรการกันบุคคลภายนอกเข้า flight line"]}, {"id": "SITE-0007", "d": "CAAT right of access is known to staff: personnel can produce certificates, approvals and records on request without delay.", "th": "บุคลากรทราบสิทธิการเข้าตรวจของ กพท. และสามารถนำใบรับรอง/เอกสาร/บันทึกมาแสดงได้ทันทีเมื่อร้องขอ", "rr": "ORA.GEN.140", "rk": "ORA.GEN.140", "ref": "OMM 1", "prev": "", "hd": 0, "dual": 1, "mt": ["INT", "DEMO"], "how": "Ask duty ops staff to retrieve ATO certificate, approval schedule and one student file within reasonable time (test drill)."}, {"id": "SITE-0008", "d": "First aid, fire extinguishers and emergency exits at the facility are serviceable, inspected in date, and unobstructed.", "th": "ชุดปฐมพยาบาล ถังดับเพลิง และทางหนีไฟ พร้อมใช้ ตรวจตามวาระ และไม่มีสิ่งกีดขวาง", "rr": "ORA.GEN.215", "rk": "ORA.GEN.215", "ref": "OMM 1.10 / ERP", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS"], "how": "Check extinguisher tags (inspection date), first-aid kit contents/expiry, exit routes clear. Sample 3 locations.", "mx": [{"t": "OMM 1.10 Location, Facilities and Infrastructure", "x": "The following facilities and infrastructure are available at D0507: For the plan of the premises and detailed descriptions of the operations room, flight planning room, briefing rooms, and theoretical instruction facilities, please refer to OM Part C Chapter D.10 'Mainbase Location and Facilities'.\n▸ 1.10.1 LOCATION AND MAIN BASE LAYOUT: Refer< D0507-OMM-ANX-1.9, KABINBURI OPERATING SITE > Mechanic and BattMechanic and BattFuel StorageFuel StoragePart storagePart storageDocument storageDocument storageMechanic roomMechanic roomAirside\n▸ 1.10.2 TRAINING AREAS AND AERODROMES USED FOR TRAINING: Refer to <OMC C.9.1Training areas and aerodromes used for training > In conformity with the training specification detailed in the syllabi and adequate for the type of aircraft used for training, the"}], "chk": ["ถังดับเพลิง tag ตรวจไม่หมดอายุ", "ชุดปฐมพยาบาลครบ ไม่หมดอายุ", "ทางหนีไฟ/ทางออกไม่ถูกกีดขวาง"]}]}, {"n": "S1.4", "subj": "Controlled documents at point of use / เอกสารควบคุม ณ จุดใช้งาน", "items": [{"id": "SITE-0009", "d": "Controlled copies of OMM, OMA, TM and forms at points of use are the current revision; obsolete revisions are removed.", "th": "สำเนาควบคุมของ OMM OMA TM และแบบฟอร์ม ณ จุดใช้งานเป็นฉบับล่าสุด และเก็บฉบับยกเลิกออกแล้ว", "rr": "ORA.ATO.130", "rk": "ORA.ATO.130", "ref": "OMM 0.6-0.7 / Distribution List", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Pick 3 locations (ops room, briefing room, aircraft). Compare copy number + revision vs Distribution List and LEP. Look for uncontrolled photocopies in use. ตรวจว่าแบบฟอร์มที่ใช้ตรงกับ List of Effective Forms", "mx": [{"t": "OMM 0.6 List of Effective Pages (LEP)", "x": "Page Issue Rev. Effective date Admin Control 1 1 0 TBA 2 1 0 TBA 3 1 0 TBA 4 1 0 TBA 5 1 0 TBA 6 1 0 TBA 7 1 0 TBA 8 1 0 TBA 9 1 0 TBA 10 1 0 TBA 11 1 0 TBA 12 1 0 TBA 13 1 0 TBA 14 1 0 TBA 15 1 0 TBA 16 1 0 TBA 17 1 0 TBA 18 1 0 TBA 19 1 0 TBA 20 1 0 TBA 21 1 0 TBA 22 1 0 TBA 23 1 0 TBA 24 1 0 TBA 25 1 0 TBA 26 1 0 TBA 27 1 0 TBA OMM PART 1 1-01 1 0 TBA 1-02 1 0 TBA 1-03 1 0 TBA 1-04 1 0 TBA 1-05 1 0 TBA 1-06 1 0 TBA 1-07 1 0 TBA 1-08 1 0 TBA 1-09 1 0 TBA 1-10 1 0 TBA 1-11 1 0 TBA 1-12 1 0 TBA"}], "chk": ["Copy number ตรง Distribution List", "Revision ตรง LEP", "ไม่มีสำเนาไม่ควบคุมใช้งานอยู่", "แบบฟอร์มที่ใช้ตรง List of Effective Forms"]}, {"id": "SITE-0010", "d": "Manual amendment process is functioning: latest CAAT-approved amendment incorporated, revision bars and record of revision filled in.", "th": "กระบวนการแก้ไขคู่มือทำงานจริง: การแก้ไขที่ กพท. อนุมัติล่าสุดถูกผนวกแล้ว มี revision bar และบันทึกการแก้ไขครบ", "rr": "ORA.ATO.130", "rk": "ORA.ATO.130", "ref": "OMM 0 / OMA 0", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Trace the latest approved amendment (e.g. OMA 2026 V3) from CAAT approval letter → record of revision → LEP → changed pages present.", "chk": ["หนังสืออนุมัติจาก กพท.", "Record of Revision กรอกครบ", "LEP อัปเดต", "หน้าแก้ไข (revision bar) ครบตามรายการ"]}]}]}]}, {"t": "Site 2 – Training Aircraft & FSTD", "th": "อากาศยานฝึกและเครื่องช่วยฝึกจำลองการบิน", "secs": [{"t": "", "groups": [{"n": "S2.1", "subj": "Fleet & airworthiness / ฝูงบินและความสมควรเดินอากาศ", "items": [{"id": "SITE-0011", "d": "Training aircraft fleet matches the OMA/TM (types, registration, equipment fit adequate for the training courses conducted).", "th": "ฝูงบินตรงกับที่ระบุใน OMA/TM (แบบ ทะเบียน อุปกรณ์ครบตามภารกิจฝึก)", "rr": "ORA.ATO.135", "rk": "ORA.ATO.135", "ref": "OMA Part B", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "XCK"], "how": "Compare aircraft on the line vs OMA Part B aircraft list. Verify equipment required for each course phase (e.g. radio nav for navigation exercises) installed and serviceable."}, {"id": "SITE-0012", "d": "For each training aircraft: Certificate of Airworthiness, Certificate of Registration, ARC, insurance and radio licence are current; documents carried/available as required.", "th": "อากาศยานฝึกแต่ละลำ: CofA, CofR, ARC, ประกันภัย, ใบอนุญาตวิทยุ ยังไม่หมดอายุ และมีเอกสารประจำเครื่องครบ", "rr": "ORA.ATO.135", "rk": "ORA.ATO.135", "ref": "OMA Part B", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Sample every aircraft (small fleet) or min 2. Record expiry dates. Check documents on board vs OMA required document list.", "chk": ["Certificate of Airworthiness (CofA)", "Certificate of Registration (CofR)", "ARC ยังไม่หมดอายุ", "กรมธรรม์ประกันภัย", "ใบอนุญาตวิทยุ", "เอกสารประจำเครื่องครบตาม OMA"]}, {"id": "SITE-0013", "d": "Maintenance status: aircraft released to service (CRS) after last scheduled maintenance; next maintenance due not exceeded; maintenance contract with AMO active.", "th": "สถานะซ่อมบำรุง: มี CRS หลังซ่อมบำรุงตามวาระล่าสุด ยังไม่เกินกำหนดครั้งถัดไป และสัญญากับหน่วยซ่อม (AMO) ยังมีผล", "rr": "ORA.ATO.135", "rk": "ORA.ATO.135", "ref": "OMA Part B / MCM", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Cross-check tech log hours vs maintenance due list. Verify CRS signature/approval number. Confirm AMO approval current (ORA.GEN.205 contracted activity oversight).", "chk": ["CRS หลังซ่อมบำรุงล่าสุด", "ชั่วโมง/วันไม่เกินกำหนดซ่อมถัดไป", "สัญญา AMO มีผล + AMO approval ปัจจุบัน"]}, {"id": "SITE-0014", "d": "Technical log / defect reporting is used in practice per OMA: open defects properly deferred (MEL where applicable), no flights with unresolved no-go defects.", "th": "สมุด tech log และการรายงานข้อบกพร่องถูกใช้จริงตาม OMA: ข้อบกพร่องค้างถูก defer อย่างถูกต้อง ไม่มีการบินทั้งที่มีข้อบกพร่องห้ามบิน", "rr": "ORA.ATO.135", "rk": "ORA.ATO.135", "ref": "OMA B.5.3 / MEL", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Review last 30 days of tech log entries for 2 aircraft. Trace one defect from report → rectification/deferral → release. Ask an FI how they report a defect found during preflight.", "mx": [{"t": "OMA B.5.3 Reporting Defect Items", "x": "Purpose: This procedure describes how to report aircraft defects before, during, and after flight to guarantee flight safety and maintenance compliance. Procedure: Before the Flight (Pre-Flight Check): Pre-Flight Inspection: The Pilot in Command (PIC) or student must properly inspect the aircraft before takeoff using the approved checklist. Report any inspection faults or anomalies promptly. Reporting Defects: Defects must be logged in the Aircraft Technical Log and reported to the Flight Operat"}], "chk": ["Tech log 30 วันย้อนหลังบันทึกครบ", "Defect → แก้ไข/defer → release ถูกต้อง", "MEL ใช้ถูกต้อง (ถ้ามี)", "FI อธิบายวิธีรายงาน defect ได้"]}, {"id": "SITE-0015", "d": "Daily/preflight check practice matches the checklist in use; fuel and oil uplift recorded; W&B within limits for training configuration.", "th": "การตรวจก่อนบิน/ประจำวันทำตาม checklist จริง บันทึกการเติมเชื้อเพลิง/น้ำมัน และ W&B อยู่ในขีดจำกัด", "rr": "ORA.ATO.135", "rk": "ORA.ATO.135", "ref": "OMA B.5 / B.9", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "DOC"], "how": "Observe one student/FI preflight against the aircraft checklist. Sample 5 journey-log pages for fuel/oil records and W&B evidence.", "mx": [{"t": "OMA B.5 Normal Procedure", "x": "▸ B.5.1 Normal Procedures and Duties Assigned: The standard operating procedures and responsibilities assigned to the PIC/pilot/instructor/student, the relevant checklists, the system for their utilisation, and a statement outlining the essential \n▸ B.5.2 Normal Checklist: Refer to AFM/POH/SOP and List of effective form to access to checklist.\n▸ B.5.3 Reporting Defect Items: Purpose: This procedure describes how to report aircraft defects before, during, and after flight to guarantee flight safety and maintenance compliance. Procedure: Before the Flight (Pre-Flight Check)\n▸ B.5.4 Release an Aircraft After Maintenance: Purpose: This procedure ensures that the aircraft is properly inspected, documented, and cleared for flight after undergoing any maintenance work. Procedure: Completion of Maintenance Work: Once maint\n▸ B.5.5 Preventing Unreleased Aircraft Flight"}], "chk": ["Preflight ทำตาม checklist จริง", "บันทึกเติมเชื้อเพลิง/น้ำมันครบ", "W&B อยู่ในขีดจำกัด (สุ่มทวน 1 ชุด)"]}]}, {"n": "S2.2", "subj": "FSTD (if applicable) / เครื่องช่วยฝึกจำลองการบิน (ถ้ามี)", "items": [{"id": "SITE-0016", "d": "FSTD qualification certificate current; device operated and maintained per the qualification basis; usage recorded in training records.", "th": "ใบรับรองคุณสมบัติ FSTD ยังไม่หมดอายุ ใช้งานและบำรุงรักษาตามเกณฑ์ และบันทึกการใช้ในบันทึกการฝึก", "rr": "ORA.FSTD.105", "rk": "ORA.FSTD.105", "ref": "OMM Part 2 FSTD", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "OBS"], "how": "If no FSTD is operated → mark N/A both dimensions. Otherwise check certificate, defect log, daily functional check records."}]}]}]}, {"t": "Site 3 – Aerodrome & Operating Sites", "th": "สนามบินและพื้นที่ปฏิบัติการ", "secs": [{"t": "", "groups": [{"n": "S3.1", "subj": "Base aerodrome / สนามบินหลัก", "items": [{"id": "SITE-0017", "d": "Base aerodrome characteristics match the OMA (runway dimensions/surface, obstacle environment, wind indicator, circuit procedures) and remain adequate for the training conducted.", "th": "ลักษณะสนามบินหลักตรงตาม OMA (ขนาด/ผิวทางวิ่ง สิ่งกีดขวาง เครื่องบอกทิศทางลม แบบวงจรการบิน) และยังเหมาะสมกับการฝึก", "rr": "ORA.ATO.140", "rk": "ORA.ATO.140", "ref": "OMA Part C", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "XCK"], "how": "Walk/drive inspection of runway, taxiway, apron condition. Compare vs OMA aerodrome data. Verify wind indicator visible from air, signage adequate.", "chk": ["สภาพ runway / taxiway / apron", "Wind indicator มองเห็นจากอากาศ", "ป้าย/เครื่องหมายเพียงพอ", "สิ่งกีดขวางตรงตามข้อมูลใน OMA"]}, {"id": "SITE-0018", "d": "Emergency equipment at the operating site (fire extinguisher, crash/rescue kit, first aid, emergency contact list) is available, in date and staff know its location.", "th": "อุปกรณ์ฉุกเฉิน ณ พื้นที่ปฏิบัติการ (ถังดับเพลิง ชุดกู้ภัย ปฐมพยาบาล รายชื่อติดต่อฉุกเฉิน) พร้อมใช้ ไม่หมดอายุ และเจ้าหน้าที่ทราบตำแหน่ง", "rr": "ORA.ATO.140", "rk": "ORA.ATO.140", "ref": "OMA Part C / ERP", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "INT"], "how": "Inspect equipment. Ask 2 staff members where the crash kit is and what the first actions after an accident are (test ERP knowledge).", "chk": ["ถังดับเพลิง", "Crash / rescue kit", "ชุดปฐมพยาบาล", "รายชื่อติดต่อฉุกเฉินปัจจุบัน", "เจ้าหน้าที่บอกตำแหน่งอุปกรณ์ได้"]}, {"id": "SITE-0019", "d": "Fuelling arrangements and fire precautions during refuelling follow the OMA procedure.", "th": "การเติมเชื้อเพลิงและการป้องกันอัคคีภัยระหว่างเติมทำตามขั้นตอนใน OMA", "rr": "ORA.ATO.140", "rk": "ORA.ATO.140", "ref": "OMA Part B/C", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS"], "how": "Observe one refuelling: bonding/earthing, extinguisher at hand, no pax on board, fuel quality check (water drain sample).", "chk": ["Bonding/earthing ขณะเติม", "ถังดับเพลิงอยู่ใกล้จุดเติม", "ไม่มีผู้โดยสารบนเครื่องขณะเติม", "ตรวจคุณภาพ/น้ำในเชื้อเพลิง (drain check)"]}, {"id": "SITE-0020", "d": "Radio coverage and ATS/UNICOM arrangements function as described; agreement with aerodrome operator (if third-party) is current.", "th": "การติดต่อวิทยุและบริการจราจรทางอากาศเป็นไปตามที่ระบุ และข้อตกลงกับผู้ดำเนินการสนามบิน (ถ้ามี) ยังมีผล", "rr": "ORA.ATO.140", "rk": "ORA.ATO.140", "ref": "OMA Part C", "prev": "", "hd": 0, "dual": 1, "mt": ["DEMO", "DOC"], "how": "Radio check from ops room/aircraft. Sight the aerodrome use agreement / letter of agreement and expiry."}]}]}]}, {"t": "Site 4 – Personnel in Practice", "th": "บุคลากร: คุณสมบัติและการปฏิบัติหน้าที่จริง", "secs": [{"t": "", "groups": [{"n": "S4.1", "subj": "Nominated persons / ผู้ดำรงตำแหน่งหลัก", "items": [{"id": "SITE-0021", "d": "Accountable Manager, Head of Training, CFI, CTKI, Safety Manager and Compliance Monitoring Manager are in post as approved, and each can explain their duties as written in the OMM.", "th": "AM, HT, CFI, CTKI, SM และ CMM ดำรงตำแหน่งจริงตามที่ได้รับความเห็นชอบ และอธิบายหน้าที่ของตนตาม OMM ได้", "rr": "ORA.GEN.210", "rk": "ORA.GEN.210", "ref": "OMM 3.2 / Org chart", "prev": "", "hd": 0, "dual": 1, "mt": ["INT", "XCK"], "how": "Interview each nominated person (15 min): duties, deputisation when absent, reporting lines vs OMM organisation chart. Cross-check CAAT approval (Form acceptance) for each post holder.", "mx": [{"t": "OMM 3.2 Staff – Name and Contacts", "x": "▸ 3.2.1 Key personnel\n▸ 3.2.2 Instruction Staff: TA: teacher assistant"}], "chk": ["Accountable Manager", "Head of Training", "CFI", "CTKI", "Safety Manager", "Compliance Monitoring Manager"]}, {"id": "SITE-0022", "d": "Deputy/absence arrangements work in practice: recent absences were covered by the deputies named in the OMM.", "th": "การมอบหมายผู้ทำการแทนใช้ได้จริง: การลา/ไม่อยู่ล่าสุดมีผู้ทำการแทนตามที่ระบุใน OMM", "rr": "ORA.GEN.210", "rk": "ORA.GEN.210", "ref": "OMM 3.2", "prev": "", "hd": 0, "dual": 1, "mt": ["INT", "DOC"], "how": "Ask HT for a recent example (leave/travel) and sight the delegation record or authorisation trail during that period.", "mx": [{"t": "OMM 3.2 Staff – Name and Contacts", "x": "▸ 3.2.1 Key personnel\n▸ 3.2.2 Instruction Staff: TA: teacher assistant"}]}]}, {"n": "S4.2", "subj": "Instructor qualifications & currency / คุณสมบัติและความต่อเนื่องของครูการบิน", "items": [{"id": "SITE-0023", "d": "Sample of FI files: licence, FI rating, class rating, medical certificate and English language proficiency all current; privileges match the instruction actually given.", "th": "สุ่มแฟ้มครูการบิน: ใบอนุญาต, FI rating, class rating, ใบสำคัญแพทย์, ELP ยังไม่หมดอายุ และสิทธิตรงกับการสอนที่ทำจริง", "rr": "ORA.ATO.110", "rk": "ORA.ATO.110", "ref": "OMA Part D / personnel files", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Sample ALL FIs if ≤5, else 50%. Build expiry matrix. Cross-check: an FI who flew student X on date Y (from flight records) held valid privileges on that date.", "chk": ["ใบอนุญาตนักบิน", "FI rating", "Class rating", "ใบสำคัญแพทย์", "ELP", "สิทธิครอบคลุมการสอนที่ทำจริง"]}, {"id": "SITE-0024", "d": "Instructor standardisation and proficiency checks are performed on schedule (D-0507-PCR-FI / STR records complete and in date).", "th": "การ standardisation และ proficiency check ของครูการบินทำตามวาระ (บันทึก D-0507-PCR-FI / STR ครบและเป็นปัจจุบัน)", "rr": "ORA.ATO.110", "rk": "ORA.ATO.110", "ref": "OMA D.2.8 / PCR-FI, STR forms", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Check PCR-FI and Standardisation Training Records for every FI vs the schedule in OMA Part D. List any overdue checks as findings.", "mx": [{"t": "OMA D.2.8 STANDARDISATION TRAINING", "x": ""}], "chk": ["PCR-FI ทุกคนยังไม่หมดอายุ", "Standardisation Training Record (STR) ครบ", "ไม่มีรายการ overdue"]}, {"id": "SITE-0025", "d": "Instructor-to-student ratio and flight/duty limits in actual scheduling comply with the OMA; instructor duty records maintained.", "th": "สัดส่วนครูต่อศิษย์และขีดจำกัดชั่วโมงบิน/ปฏิบัติหน้าที่ในตารางจริงเป็นไปตาม OMA และมีบันทึกเวลาปฏิบัติหน้าที่ของครู", "rr": "ORA.ATO.110", "rk": "ORA.ATO.110", "ref": "OMA Part A/D", "prev": "", "hd": 0, "dual": 1, "mt": ["XCK", "DOC"], "how": "Take one busy month: compute each FI's flight hours & duty days from authorisation sheets vs OMA limits. Check current student allocation list per FI."}, {"id": "SITE-0026", "d": "TKI qualifications on file; theoretical knowledge instruction actually delivered by qualified TKIs per the approved course.", "th": "คุณสมบัติครูภาควิชาการครบตามแฟ้ม และการสอนภาควิชาการดำเนินการโดย TKI ที่มีคุณสมบัติตามหลักสูตรที่ได้รับอนุมัติ", "rr": "ORA.ATO.110", "rk": "ORA.ATO.110", "ref": "OMA Part D / PCR-TKI", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Sample TKI files (PCR-TKI). Cross-check ground school timetable instructor names vs qualified TKI list."}]}, {"n": "S4.3", "subj": "Staff training implementation / การฝึกอบรมบุคลากรที่ทำจริง", "items": [{"id": "SITE-0027", "d": "Initial, refresher, standardisation and safety training defined in OMA Part D have actually been delivered — attendance records and evaluation on file for each staff member.", "th": "การอบรม initial/refresher/standardisation/safety ตาม OMA Part D จัดจริง มีบันทึกการเข้าอบรมและการประเมินของบุคลากรแต่ละคน", "rr": "ORA.GEN.210", "rk": "ORA.GEN.210", "ref": "OMA Part D / D-0507-RTR-001, Staff Training Plan", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Build a training matrix: staff × required courses vs records (RTR forms, Staff Training Plan). Interview one recent joiner about their induction content.", "chk": ["Training matrix ครบทุกคน", "แบบ RTR / บันทึกการอบรม", "การประเมินผลหลังอบรม", "Induction ผู้เข้าใหม่มีเนื้อหาครบ"]}, {"id": "SITE-0028", "d": "SMS training: all personnel have received safety training appropriate to their role; records current per the training plan.", "th": "บุคลากรทุกคนผ่านการอบรม SMS ตามบทบาท และบันทึกเป็นปัจจุบันตามแผนการอบรม", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 4 / OMM 8", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Check SMS training records vs staff list. Ask 2 random staff: how do you report a hazard? (answers should match the manual)."}]}]}]}, {"t": "Site 5 – Records & Record-keeping in Practice", "th": "ระบบบันทึกและการเก็บรักษาจริง", "secs": [{"t": "", "groups": [{"n": "S5.1", "subj": "Student training records / บันทึกการฝึกของศิษย์การบิน", "items": [{"id": "SITE-0029", "d": "Sample of student files: enrolment documents, pre-entry checks (age, medical class, ELP), training agreement and ID all present and verified before training started.", "th": "สุ่มแฟ้มศิษย์การบิน: เอกสารรับเข้า การตรวจคุณสมบัติก่อนเข้า (อายุ ใบสำคัญแพทย์ ELP) สัญญาฝึก และบัตรประจำตัว ครบและตรวจก่อนเริ่มฝึกจริง", "rr": "ORA.ATO.145", "rk": "ORA.ATO.145", "ref": "TM / PPL course manual 2.1", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Sample ≥3 active + 2 graduated students. Verify medical class/validity date precedes first flight date. รายการใดขาดให้บันทึกเป็น finding พร้อมชื่อแฟ้ม", "chk": ["ใบสมัคร / สัญญาการฝึก", "อายุถึงเกณฑ์ก่อนบินเดี่ยว", "ใบสำคัญแพทย์ออกก่อนบินครั้งแรก", "ELP", "เอกสารประจำตัว (บัตร/Passport)"]}, {"id": "SITE-0030", "d": "Flight training records complete and signed: each flight has lesson number, exercises, duration, instructor signature and student progress grading matching the TM syllabus sequence.", "th": "บันทึกการฝึกบินครบและมีลายเซ็น: ทุกเที่ยวบินมีหมายเลขบทเรียน แบบฝึก เวลา ลายเซ็นครู และการประเมินความก้าวหน้าตามลำดับใน TM", "rr": "ORA.ATO.120", "rk": "ORA.ATO.120", "ref": "TM / student records", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Trace 2 students end-to-end: every logged flight vs TM lesson sequence; check pre-solo requirements (written test, weather, endorsement) completed before first solo date.", "chk": ["เลขบทเรียนเรียงตาม TM", "ลายเซ็นครูครบทุกเที่ยว", "การประเมินความก้าวหน้าครบ", "Pre-solo requirements ครบก่อนเดี่ยวแรก"]}, {"id": "SITE-0031", "d": "Theoretical knowledge progress: attendance, progress tests and course completion certificates on file and consistent with ground school timetable.", "th": "ภาควิชาการ: บันทึกการเข้าเรียน ผลสอบความก้าวหน้า และใบรับรองจบภาคทฤษฎี ครบและสอดคล้องกับตารางสอนจริง", "rr": "ORA.ATO.120", "rk": "ORA.ATO.120", "ref": "TM / PPL course manual", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Same 2 students: attendance % vs course requirement, progress test scores vs pass mark in TM, completion certificate before TK exam application."}, {"id": "SITE-0032", "d": "Flight time cross-check: student logbook, training record, aircraft journey log and authorisation sheet agree for sampled flights.", "th": "ตรวจไขว้ชั่วโมงบิน: สมุดปูมศิษย์ บันทึกการฝึก journey log ของอากาศยาน และใบอนุมัติการบิน ตรงกันในเที่ยวบินที่สุ่ม", "rr": "ORA.ATO.120", "rk": "ORA.ATO.120", "ref": "OMA Part A / records system", "prev": "", "hd": 0, "dual": 1, "mt": ["XCK"], "how": "Pick 5 flights across different dates/aircraft: all four sources must agree on date, times, crew. Any mismatch = finding (record integrity).", "chk": ["Logbook ศิษย์", "Training record", "Journey log อากาศยาน", "ใบอนุมัติการบิน — ทั้ง 4 แหล่งตรงกัน (5 เที่ยว)"]}]}, {"n": "S5.2", "subj": "Storage, retention & protection / การจัดเก็บ การเก็บรักษา และการป้องกัน", "items": [{"id": "SITE-0033", "d": "Records are stored securely with protection from damage, alteration and theft; retention periods met (training records kept per TCAR after course completion).", "th": "บันทึกถูกจัดเก็บอย่างปลอดภัย ป้องกันความเสียหาย/แก้ไข/สูญหาย และเก็บครบตามระยะเวลาที่ TCAR กำหนดหลังจบหลักสูตร", "rr": "ORA.GEN.220", "rk": "ORA.GEN.220", "ref": "OMM / OMA record-keeping section", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "DOC"], "how": "Inspect records room: lock, fire protection, indexing. Request one file of a student who completed >1 year ago (retrieval test). Verify retention rule in OMM matches practice.", "chk": ["ห้อง/ตู้ล็อกได้", "ป้องกันไฟ/น้ำ", "ดัชนีค้นหาได้", "Retention ครบตามกำหนด", "ทดสอบค้นแฟ้มเก่า >1 ปีสำเร็จ"]}, {"id": "SITE-0034", "d": "Electronic records (if used) are backed up; backup actually restorable; access rights limited to authorised persons.", "th": "บันทึกอิเล็กทรอนิกส์ (ถ้ามี) มีการสำรองข้อมูล ทดสอบกู้คืนได้จริง และจำกัดสิทธิเข้าถึงเฉพาะผู้ได้รับอนุญาต", "rr": "ORA.GEN.220", "rk": "ORA.GEN.220", "ref": "OMM record-keeping", "prev": "", "hd": 0, "dual": 1, "mt": ["DEMO", "INT"], "how": "Ask admin to show backup log and restore one sample file. Review user access list vs authorised roles."}, {"id": "SITE-0035", "d": "FRAE flight risk assessment forms are completed for flights as required and retained; risk scores and Go/No-Go decisions documented.", "th": "แบบ FRAE ถูกกรอกจริงทุกเที่ยวบินตามข้อกำหนดและจัดเก็บไว้ พร้อมคะแนนความเสี่ยงและการตัดสินใจ Go/No-Go", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "D-0507-FRAE-001 / OMM 4", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Sample 10 recent flights from authorisation sheet → matching FRAE form exists, scored, signed by authorising FI. Check any high-score flight had mitigation/approval per procedure.", "chk": ["FRAE ครบทุกเที่ยวที่สุ่ม (10)", "คะแนนความเสี่ยง + ลายเซ็นครบ", "เที่ยว high-risk มี mitigation/อนุมัติพิเศษ"]}]}]}]}, {"t": "Site 6 – SMS Implementation", "th": "การนำระบบจัดการด้านนิรภัย (SMS) ไปปฏิบัติจริง", "secs": [{"t": "", "groups": [{"n": "S6.1", "subj": "Safety policy & organisation / นโยบายและโครงสร้างนิรภัย", "items": [{"id": "SITE-0036", "d": "Safety policy is signed by the current Accountable Manager, displayed/communicated, and staff can state its key commitments (including just culture).", "th": "นโยบายนิรภัยลงนามโดย AM คนปัจจุบัน เผยแพร่จริง และบุคลากรบอกสาระสำคัญได้ (รวมถึง just culture)", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 1.1 / 4", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "INT"], "how": "Sight displayed policy (check signatory = current AM). Ask 3 staff: what happens if you report your own error? (answer should reflect just culture).", "mx": [{"t": "OMM 1.1 Safety Policy", "x": "▸ 1.1.1 Safety Policy Statement: D-0507 commits to: Continuously Improve Safety Performance: We are committed to continuously enhancing our safety practices by learning from our operational experiences and implementing improvements. \n▸ 1.1.2 Just Culture: D-0507 Flight Training adheres to Just Culture principles, which ensure that our staff are treated fairly and encouraged to report safety concerns. We differentiate between acceptable and unacceptable\n▸ 1.1.3 Implementation and Maintenance: To ensure the effectiveness of this Organisation Management Manual, regular training sessions and meetings will be held to review and update procedures, ensuring all personnel remain informed and comp"}], "chk": ["ลงนามโดย AM คนปัจจุบัน", "ติดประกาศ/เผยแพร่จริง", "บุคลากรอธิบาย just culture ได้ (ถาม 3 คน)"]}, {"id": "SITE-0037", "d": "Safety Manager is active in the role; safety committee / Safety Action Group meets per the schedule in the OMM — minutes, attendance and action tracking on file.", "th": "SM ปฏิบัติหน้าที่จริง คณะกรรมการนิรภัย/SAG ประชุมตามวาระใน OMM มีรายงานการประชุม ผู้เข้าร่วม และการติดตามข้อสั่งการ", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 4", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Review last 4 meeting minutes vs required frequency. Pick 2 open actions: verify follow-up to closure. Interview SM on current top risks.", "chk": ["ประชุมครบตามวาระ (ดู 4 ครั้งล่าสุด)", "รายงานการประชุม + ผู้เข้าร่วม", "Action ติดตามจนปิด (สุ่ม 2)", "SM บอก top risks ปัจจุบันได้"]}]}, {"n": "S6.2", "subj": "Hazard reporting & risk management / การรายงานอันตรายและการจัดการความเสี่ยง", "items": [{"id": "SITE-0038", "d": "Hazard/occurrence reporting system is used in practice: reports exist, are investigated, feedback given to reporters, and the hazard register is maintained and current.", "th": "ระบบรายงานอันตราย/เหตุการณ์ถูกใช้จริง: มีรายงาน มีการสอบสวน มี feedback ถึงผู้รายงาน และทะเบียนอันตราย (hazard register) เป็นปัจจุบัน", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 4 / hazard register", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Count reports in last 12 months (zero reports at an active ATO is itself a red flag — reporting culture). Trace 2 reports: report → risk assessment → mitigation → feedback. Check register review date.", "chk": ["มีรายงานในรอบ 12 เดือน (0 รายงาน = red flag)", "การสอบสวน/ประเมินความเสี่ยงต่อรายงาน", "Feedback ถึงผู้รายงาน", "Hazard register ทบทวนล่าสุดไม่เกินกำหนด"]}, {"id": "SITE-0039", "d": "Risk assessments are performed for identified hazards and for changes (new aircraft, new training site, new course) — management of change records exist.", "th": "มีการประเมินความเสี่ยงสำหรับอันตรายที่พบและการเปลี่ยนแปลง (อากาศยานใหม่ พื้นที่ใหม่ หลักสูตรใหม่) — มีบันทึก management of change", "rr": "ORA.GEN.130", "rk": "ORA.GEN.130", "ref": "OMM 4 / MOC records", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Identify last significant change (e.g. manual V3 revision, new aircraft) and sight the change risk assessment. If none ever documented → implementation gap."}, {"id": "SITE-0040", "d": "Safety performance indicators (SPIs) are being measured and reviewed against targets/alert levels as defined in the OMM.", "th": "มีการเก็บและทบทวนตัวชี้วัดนิรภัย (SPI) เทียบเป้าหมาย/ระดับแจ้งเตือนตามที่กำหนดใน OMM", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 4.4", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Sight the current SPI dashboard/report and the last review where an SPI was discussed. Verify data actually collected (not blank template).", "mx": [{"t": "OMM 4.4 Safety Performance Standards", "x": "▸ 4.4.1 Promotion of a Safety-First Culture: The organisation will ensure that safety is prioritised at all times by creating an open, transparent environment where staff, instructors, and students are encouraged to report safety concerns withou\n▸ 4.4.2 Operational Risk Minimisation: All operational risks will be proactively identified, assessed, and mitigated. This includes risks related to flight training, ground operations, and maintenance activities. A comprehensive risk manag\n▸ 4.4.3 Regulatory Compliance: Full compliance with the regulations and industry standards, particularly those set by the Civil Aviation Authority of Thailand (CAAT) and other governing bodies, will be maintained. The organisation \n▸ 4.4.4 Safety Awareness Through Training: Continuous safety education and training will be provided for all personnel to ensure they possess the necessary skills and knowledge to perform their roles safely. Training programs will include init\n▸ 4.4.5 Hazard Reporting and Incident Investigation: An effective hazard reporting system will be maintained, encouraging prompt reporting of potential hazards and safety concerns. Incidents will be thoroughly investigated with root cause analysis to id\n▸ 4.4.6 Commitment to Continuous Improvement: The organisation will regularly review its safety policies, procedures, and practices, making updates as needed to reflect evolving industry best practices. Continuous improvement will be an ongoing o\n▸ 4.4.7 Safe Working Environment: All"}]}]}, {"n": "S6.3", "subj": "Occurrence reporting to CAAT & immediate reaction / การรายงานต่อ กพท.", "items": [{"id": "SITE-0041", "d": "Mandatory occurrences were reported to CAAT within the required timeframe; internal investigation completed and corrective actions taken.", "th": "เหตุการณ์ที่ต้องรายงานถูกส่งถึง กพท. ภายในเวลาที่กำหนด มีการสอบสวนภายในและแก้ไขแล้ว", "rr": "ORA.GEN.160", "rk": "ORA.GEN.160", "ref": "OMM 4 / occurrence log", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Cross-check internal occurrence log vs CAAT submissions (report reference/date). If no occurrences in period, verify staff know the reporting criteria & 72-hr/timeframe rule (interview).", "chk": ["Occurrence log ภายในตรงกับที่ส่ง กพท.", "ส่งภายในกรอบเวลา", "การสอบสวนภายใน + corrective action ปิดแล้ว"]}, {"id": "SITE-0042", "d": "Safety directives / airworthiness directives / CAAT safety decisions are received, actioned and closed with evidence (immediate reaction capability).", "th": "Safety directives / AD / ข้อสั่งการของ กพท. ถูกรับ ดำเนินการ และปิดพร้อมหลักฐาน", "rr": "ORA.GEN.155", "rk": "ORA.GEN.155", "ref": "OMM 4 / correspondence file", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Sight the register of received directives, pick the latest one, trace action taken and closure date."}]}, {"n": "S6.4", "subj": "Emergency response / แผนตอบสนองภาวะฉุกเฉิน", "items": [{"id": "SITE-0043", "d": "Emergency Response Plan is current (contact numbers verified), staff know their roles, and a drill/exercise has been conducted per the schedule with lessons recorded.", "th": "ERP เป็นปัจจุบัน (เบอร์ติดต่อใช้ได้จริง) บุคลากรรู้บทบาท และมีการซ้อมตามวาระพร้อมบันทึกบทเรียน", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM / ERP", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT", "DEMO"], "how": "Call-test 2 numbers from the ERP contact list. Ask duty staff their first 3 actions after an aircraft accident. Sight last drill record and follow-up items.", "chk": ["โทรทดสอบเบอร์ใน ERP 2 เบอร์ติดต่อได้", "เจ้าหน้าที่บอก 3 ขั้นตอนแรกหลังอุบัติเหตุได้", "บันทึกการซ้อมล่าสุด + lessons learned"]}]}]}]}, {"t": "Site 7 – Compliance Monitoring in Practice", "th": "การติดตามการปฏิบัติตามข้อกำหนดที่ทำจริง", "secs": [{"t": "", "groups": [{"n": "S7.1", "subj": "Audit programme execution / การดำเนินโปรแกรมตรวจติดตาม", "items": [{"id": "SITE-0044", "d": "The annual audit plan/programme covers all areas and applicable requirements; audits actually performed on schedule with reports on file.", "th": "แผนตรวจติดตามประจำปีครอบคลุมทุกพื้นที่/ข้อกำหนด และมีการตรวจจริงตามกำหนดพร้อมรายงาน", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 5 / audit plan", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Compare audit plan vs completed audit reports (last 12-24 months). Identify overdue audits. Verify checklists used and objective evidence recorded in reports.", "chk": ["แผนตรวจครอบคลุมทุกพื้นที่/ข้อกำหนด", "การตรวจทำจริงตามกำหนด", "รายงานตรวจ + checklist + objective evidence"]}, {"id": "SITE-0045", "d": "Findings from internal and CAAT audits are managed to closure: root cause analysis, corrective action, verification of effectiveness, within target dates.", "th": "ข้อบกพร่องจากการตรวจภายในและจาก กพท. ถูกจัดการจนปิด: วิเคราะห์สาเหตุราก แก้ไข ทวนสอบประสิทธิผล ภายในกำหนด", "rr": "ORA.GEN.150", "rk": "ORA.GEN.150", "ref": "OMM 5 / CAPA log", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC"], "how": "Trace ALL open findings + 3 closed ones: finding → root cause → CA → evidence → closure sign-off. Overdue CAs = finding. รวมข้อบกพร่องจากการตรวจของ กพท. รอบล่าสุด (Findings_PageRef)", "chk": ["ทุก finding มี root cause analysis", "Corrective action + หลักฐาน", "ทวนสอบประสิทธิผลก่อนปิด", "ไม่มี CA overdue"]}, {"id": "SITE-0046", "d": "Compliance Monitoring Manager independence is real in practice (does not audit own work); auditors used are those on the approved list with training records.", "th": "ความเป็นอิสระของ CMM เกิดขึ้นจริง (ไม่ตรวจงานตนเอง) และผู้ตรวจอยู่ในบัญชีที่กำหนดพร้อมบันทึกการอบรม", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 5.1", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Review who audited what vs role conflicts. Sight auditor list and their audit training evidence per OMM 5.1.", "mx": [{"t": "OMM 5.1 Audits and Inspections", "x": "▸ 5.1.1 Type of Audit and Inspection: Internal Audits: Internal audits are carried out to verify that all departments within the D0507 are operating in accordance with the D0507's own procedures and relevant regulatory requirements. Inter\n▸ 5.1.2 List of Necessary Auditors: The following auditors have the privileges to perform compliance monitoring audits within the ATO:\n▸ 5.1.3 Assessing Auditor Independence: To ensure the integrity and objectivity of the auditing process, the ATO takes the following steps to assess the independence of auditors:"}]}, {"id": "SITE-0047", "d": "Management review / Accountable Manager oversight happens as scheduled: AM has reviewed compliance and safety performance and allocated resources where needed.", "th": "การทบทวนโดยฝ่ายบริหาร/AM เกิดขึ้นตามวาระ: AM ได้ทบทวนผลด้าน compliance และนิรภัย และจัดสรรทรัพยากรเมื่อจำเป็น", "rr": "ORA.GEN.200", "rk": "ORA.GEN.200", "ref": "OMM 4-5", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Sight last management review minutes with AM attendance. Interview AM: awareness of current findings and top safety risks."}, {"id": "SITE-0048", "d": "Regulatory watch: a process is actively tracking TCAR/CAAT amendments and feeding required manual changes (evidence of recent amendment assessments).", "th": "มีการติดตามการแก้ไข TCAR/ประกาศ กพท. อย่างต่อเนื่อง และนำมาประเมินผลกระทบต่อคู่มือ (มีหลักฐานการประเมินครั้งล่าสุด)", "rr": "ORA.GEN.120", "rk": "ORA.GEN.120", "ref": "OMM 5 / regulation register", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "INT"], "how": "Ask CMM how a new CAAT regulation reaches the manuals. Sight the assessment of TCAR PEL Part ORA Rev 00 (OCT 2024) impact — this GAP analysis itself is evidence."}]}]}]}, {"t": "Site 8 – Training Operations Observation", "th": "สังเกตการณ์การปฏิบัติการฝึกจริง", "secs": [{"t": "", "groups": [{"n": "S8.1", "subj": "Flight authorisation & preparation / การอนุมัติและเตรียมการบิน", "items": [{"id": "SITE-0049", "d": "Flight authorisation is signed by an authorised person BEFORE each training flight; authorisation sheet content matches the OMA procedure.", "th": "ทุกเที่ยวบินฝึกมีผู้มีอำนาจลงนามอนุมัติก่อนบิน และเนื้อหาใบอนุมัติตรงตามขั้นตอนใน OMA", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "OMA Part A/C", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "DOC"], "how": "Observe the morning launch: authorisation signed before engine start? Sample 10 past sheets: signatures, times, aircraft, exercise codes complete.", "chk": ["ลงนามก่อนสตาร์ทเครื่องทุกเที่ยว", "ผู้ลงนามมีอำนาจตาม OMA", "สุ่ม 10 ใบ: ข้อมูลครบ (เวลา/เครื่อง/แบบฝึก)"]}, {"id": "SITE-0050", "d": "Pre-flight preparation is done per OMA: weather + NOTAM briefing, W&B and performance calculation, fuel plan — evidenced for each observed flight.", "th": "การเตรียมการบินทำตาม OMA: brief อากาศ+NOTAM คำนวณ W&B/สมรรถนะ แผนเชื้อเพลิง — มีหลักฐานทุกเที่ยวบินที่สังเกต", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "OMA Part B/C", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "DOC"], "how": "Shadow one student+FI through full pre-flight process. Verify calculations actually done (not pencil-whipped) — recompute one W&B.", "chk": ["Weather + NOTAM briefing มีหลักฐาน", "W&B คำนวณจริง (ทวนซ้ำ 1 ชุด)", "Performance/แผนเชื้อเพลิงครบ"]}, {"id": "SITE-0051", "d": "Weather minima applied in practice: observed/planned flights respect student vs instructor minima in the OMA; a marginal-weather decision trail exists.", "th": "ใช้ weather minima จริง: เที่ยวบินที่สังเกต/วางแผนเคารพ minima ของศิษย์กับครูตาม OMA และมีร่องรอยการตัดสินใจในวันอากาศก้ำกึ่ง", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "OMA C.3", "prev": "", "hd": 0, "dual": 1, "mt": ["XCK", "INT"], "how": "Pick 2 past marginal-weather days (from METAR history): what flights ran? Were solo flights within student minima? Ask duty FI how a no-go decision is recorded.", "mx": [{"t": "OMA C.3 Weather minima", "x": "There is no specific take-off or landing limit for visibility as determined by the current weather information and correlated to flight operation time. Operations must comply with the flight rules as filed in the flight plan and the aircraft's flying capabilities. For students, weather minima will be more restrictive based on their experience level and the course they are attending.\n▸ C.3.1 Weather Minima for VFR and IFR Flights: In normal operation for pilot or instructor as PIC.\n▸ C.3.2 Weather minima for students - at various stages of training: This section outlines the specific weather minima students must adhere to at different training stages. These minima ensure safety and effectiveness, considering varying experience and training demand"}]}]}, {"n": "S8.2", "subj": "Instruction delivery vs approved syllabus / การสอนตรงตามหลักสูตรที่อนุมัติ", "items": [{"id": "SITE-0052", "d": "Observed pre-flight (long) briefing follows the TM briefing syllabus content and duration; training aids used.", "th": "การ briefing ที่สังเกตเป็นไปตามเนื้อหาและเวลาของ long briefing ใน TM และใช้สื่อช่วยสอน", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "TM / PPL A1 long briefing syllabus", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS"], "how": "Sit in on one long briefing. Score content vs TM/PPL course manual briefing syllabus for that lesson. Note duration vs published hours.", "chk": ["เนื้อหาตรง long briefing syllabus ใน TM", "ระยะเวลาตามที่กำหนด", "ใช้สื่อ/อุปกรณ์ช่วยสอน"]}, {"id": "SITE-0053", "d": "Observed ground school lesson matches the approved TK syllabus and lesson plan; student attendance recorded in real time.", "th": "คาบเรียนภาคทฤษฎีที่สังเกตตรงกับหลักสูตร TK และแผนการสอนที่อนุมัติ มีการบันทึกการเข้าเรียนจริง", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "TM / Lesson Plan", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "XCK"], "how": "Observe 30+ min of one class. Compare topic vs timetable vs TM syllabus reference. Check attendance sheet completed during (not after) class."}, {"id": "SITE-0054", "d": "Training sequence in practice follows the TM: no student found flying exercises out of sequence or beyond authorised phase without documented HT approval.", "th": "ลำดับการฝึกจริงเป็นไปตาม TM: ไม่พบศิษย์บินข้ามลำดับหรือเกิน phase ที่ได้รับอนุญาตโดยไม่มีการอนุมัติของ HT เป็นลายลักษณ์อักษร", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "TM / student records", "prev": "", "hd": 0, "dual": 1, "mt": ["XCK"], "how": "From the 2 traced student files (Site 5): flag any out-of-sequence lessons and check for documented deviation approval."}, {"id": "SITE-0055", "d": "Solo flight supervision: pre-solo checks completed, FI authorises and monitors each solo, solo conducted within limitations (weather, area, duration).", "th": "การบินเดี่ยว: ตรวจก่อนบินเดี่ยวครบ ครูอนุมัติและติดตามทุกเที่ยว และบินภายในข้อจำกัด (อากาศ พื้นที่ เวลา)", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "TM / OMA C", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "OBS"], "how": "Sample 3 recent solo flights: endorsement, FI presence/monitoring arrangement, weather at time vs student minima (pull METAR).", "chk": ["Pre-solo endorsement ครบ", "FI อนุมัติ+กำกับทุกเที่ยวเดี่ยว", "อากาศขณะบินอยู่ใน minima ศิษย์ (ดู METAR ย้อนหลัง)", "พื้นที่/ระยะเวลาในข้อจำกัด"]}, {"id": "SITE-0056", "d": "Post-flight debrief and progress grading are done after each flight and recorded before the next lesson; failing progress triggers the review process in the TM.", "th": "มี debrief และการประเมินหลังบินทุกเที่ยว บันทึกก่อนบทเรียนถัดไป และผลไม่ผ่านเข้าสู่กระบวนการทบทวนตาม TM", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "TM / ECA assessment standards", "prev": "", "hd": 0, "dual": 1, "mt": ["OBS", "DOC"], "how": "Observe one debrief. In sampled files: any 'unsatisfactory' lesson followed by the required repeat/review action? Progress review board records exist?"}]}, {"n": "S8.3", "subj": "Examinations & tests in practice / การสอบและทดสอบที่ทำจริง", "items": [{"id": "SITE-0057", "d": "Internal progress tests and pre-exam assessments are conducted, marked and secured (question bank control) as described in the TM.", "th": "การสอบความก้าวหน้าและ pre-exam ดำเนินการ ตรวจ และควบคุมข้อสอบ (คลังข้อสอบ) ตามที่ระบุใน TM", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "TM / ECA", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "OBS"], "how": "Sight question bank access control. Sample marked test papers vs answer keys and pass marks. Check invigilation records."}, {"id": "SITE-0058", "d": "Skill test recommendations: students are recommended only after completing all required training; recommendation forms signed by HT/CFI as required.", "th": "การส่งสอบภาคปฏิบัติ: ศิษย์ถูกส่งสอบเมื่อฝึกครบตามหลักสูตรเท่านั้น และแบบ recommendation ลงนามโดย HT/CFI ตามที่กำหนด", "rr": "ORA.ATO.125", "rk": "ORA.ATO.125", "ref": "TM / PPL course manual 6", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "For last 2 skill-test candidates: verify total hours & syllabus completion vs TM minima on the date of recommendation.", "chk": ["ชั่วโมงรวมครบตาม TM ณ วันส่งสอบ", "Syllabus ครบทุกบท", "แบบ recommendation ลงนาม HT/CFI"]}]}]}]}, {"t": "Site 9 – Contracted Activities & Certificate Scope", "th": "กิจกรรมจ้างช่วงและขอบเขตใบรับรอง", "secs": [{"t": "", "groups": [{"n": "S9.1", "subj": "Contracted activities oversight / การกำกับดูแลงานจ้างช่วง", "items": [{"id": "SITE-0059", "d": "All contracted activities (maintenance, ground handling, medical, exam services, fuel) are listed as in the OMM, contracts current, and the ATO exercises documented oversight of each contractor.", "th": "กิจกรรมจ้างช่วงทั้งหมด (ซ่อมบำรุง ภาคพื้น การแพทย์ บริการสอบ เชื้อเพลิง) ตรงตามที่ระบุใน OMM สัญญายังมีผล และ ATO กำกับดูแลผู้รับจ้างโดยมีหลักฐาน", "rr": "ORA.GEN.205", "rk": "ORA.GEN.205", "ref": "OMM / contracts file", "prev": "", "hd": 0, "dual": 1, "mt": ["DOC", "XCK"], "how": "Compare actual contractors in use vs OMM contracted-activities list. Sight each contract validity + latest oversight evidence (audit, review meeting, performance check of AMO).", "chk": ["รายชื่อผู้รับจ้างตรงกับ OMM", "สัญญาทุกฉบับยังมีผล", "หลักฐาน oversight ต่อผู้รับจ้างแต่ละราย"]}]}, {"n": "S9.2", "subj": "Certificate, approvals & changes / ใบรับรองและการเปลี่ยนแปลง", "items": [{"id": "SITE-0060", "d": "ATO certificate ( <script>
"use strict";
// ═══════════ SERVER SYNC CONFIG ═══════════

// ถ้าเป็น null แอปทำงานแบบออฟไลน์ (บันทึก/เปิดไฟล์ JSON) เหมือนเดิมทุกอย่าง
const FIREBASE_CONFIG = {

};

const FIREBASE_CONFIG = {
